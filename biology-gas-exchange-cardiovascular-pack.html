<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Biology Gas Exchange, Transport & Cardiovascular Pack — 9BI0</title>
<style>
  :root{
    --bg:#0d1117;
    --card-bg:#161b22;
    --card-back:#1c2333;
    --border:#2a3346;
    --text:#e6edf3;
    --text-dim:#8b96a5;
    --accent:#4fd1c5;
    --accent2:#a78bfa;
    --good:#3fb950;
    --warn:#f0b429;
    --danger:#f85149;
    --shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overscroll-behavior:none;
  }
  body{
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh;
    min-height:-webkit-fill-available;
    padding: env(safe-area-inset-top,16px) 16px calc(env(safe-area-inset-bottom,16px) + 12px);
  }
  header{
    width:100%; max-width:520px; text-align:center; padding-top:10px;
  }
  h1{
    font-size:1.05rem; font-weight:700; margin:4px 0 2px; letter-spacing:0.2px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .subtitle{ font-size:0.75rem; color:var(--text-dim); margin-bottom:10px;}

  .topic-bar{
    width:100%; max-width:520px;
    display:flex; gap:6px; overflow-x:auto; padding:4px 2px 10px;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .topic-bar::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;
    padding:7px 12px;
    border-radius:20px;
    background:var(--card-bg);
    border:1px solid var(--border);
    color:var(--text-dim);
    font-size:0.72rem;
    font-weight:600;
    white-space:nowrap;
    cursor:pointer;
    transition:all .15s ease;
  }
  .chip.active{
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    color:#0d1117;
    border-color:transparent;
  }

  .progress-row{
    width:100%; max-width:520px;
    display:flex; align-items:center; justify-content:space-between;
    font-size:0.72rem; color:var(--text-dim); margin-bottom:8px; padding:0 2px;
  }
  .progress-track{
    flex:1; height:5px; background:var(--border); border-radius:4px; margin:0 10px; overflow:hidden;
  }
  .progress-fill{
    height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); width:0%;
    transition:width .25s ease;
  }

  .stage{
    width:100%; max-width:520px;
    flex:1;
    display:flex; align-items:center; justify-content:center;
    perspective:1400px;
    margin: 6px 0 14px;
    min-height:340px;
  }
  .card{
    width:100%;
    height:360px;
    position:relative;
    transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.2,.9,.3,1);
    cursor:pointer;
  }
  .card.flipped{ transform:rotateY(180deg); }
  .face{
    position:absolute; inset:0;
    backface-visibility:hidden;
    border-radius:20px;
    border:1px solid var(--border);
    box-shadow:var(--shadow);
    display:flex; flex-direction:column;
    padding:22px;
    overflow-y:auto;
  }
  .face::-webkit-scrollbar{width:4px;}
  .face::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}
  .front{
    background:radial-gradient(circle at 30% 20%, #1c2333, var(--card-bg) 70%);
    justify-content:center; align-items:center; text-align:center;
  }
  .back{
    background:radial-gradient(circle at 70% 20%, #232c44, var(--card-back) 70%);
    transform:rotateY(180deg);
    justify-content:flex-start; align-items:flex-start; text-align:left;
  }
  .tag{
    position:absolute; top:14px; left:14px;
    font-size:0.62rem; font-weight:700; letter-spacing:0.5px; text-transform:uppercase;
    color:var(--accent);
    background:rgba(79,209,197,0.1);
    border:1px solid rgba(79,209,197,0.3);
    padding:3px 8px; border-radius:20px;
  }
  .card-index{
    position:absolute; top:14px; right:14px;
    font-size:0.65rem; color:var(--text-dim);
  }
  .q-text{
    font-size:1.15rem; font-weight:600; line-height:1.4; margin-top:20px;
  }
  .tap-hint{
    position:absolute; bottom:14px; left:0; right:0; text-align:center;
    font-size:0.65rem; color:var(--text-dim);
  }
  .a-label{
    font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;
    color:var(--accent2); margin:20px 0 8px;
  }
  .a-text{
    font-size:1rem; line-height:1.5; font-weight:500;
  }
  .a-text ul{ margin:6px 0 0 18px; padding:0; }
  .a-text li{ margin-bottom:4px; }

  .controls{
    width:100%; max-width:520px;
    display:flex; align-items:center; gap:10px;
    margin-bottom:8px;
  }
  .btn{
    flex:1;
    background:var(--card-bg);
    border:1px solid var(--border);
    color:var(--text);
    padding:13px 10px;
    border-radius:14px;
    font-size:0.85rem;
    font-weight:600;
    display:flex; align-items:center; justify-content:center; gap:6px;
    cursor:pointer;
    -webkit-user-select:none; user-select:none;
    transition:transform .1s ease, background .15s ease;
  }
  .btn:active{ transform:scale(0.96); background:#1e2635; }
  .btn.wide{ flex:2; }
  .btn.icon-only{ flex:0 0 52px; font-size:1.1rem; }

  .rate-row{
    width:100%; max-width:520px;
    display:flex; gap:8px; margin-bottom:6px;
  }
  .rate-btn{
    flex:1;
    padding:11px 6px;
    border-radius:12px;
    border:1px solid var(--border);
    background:var(--card-bg);
    font-size:0.72rem;
    font-weight:700;
    text-align:center;
    cursor:pointer;
    -webkit-user-select:none; user-select:none;
  }
  .rate-btn.again{ color:var(--danger); }
  .rate-btn.hard{ color:var(--warn); }
  .rate-btn.good{ color:var(--good); }
  .rate-btn:active{ transform:scale(0.96); }

  .footer-row{
    width:100%; max-width:520px;
    display:flex; justify-content:space-between; align-items:center;
    font-size:0.68rem; color:var(--text-dim); margin-top:6px;
  }
  .footer-row span.link{
    color:var(--accent); cursor:pointer; font-weight:600;
  }

  .done-screen{
    width:100%; max-width:520px; text-align:center; padding:30px 10px;
  }
  .done-screen h2{ color:var(--good); font-size:1.3rem; margin-bottom:6px;}
  .done-screen p{ color:var(--text-dim); font-size:0.85rem; }

  @media (max-height:700px){
    .card{ height:310px; }
    .stage{ min-height:300px; }
  }
</style>
</head>
<body>

<header>
  <h1>Gas Exchange &amp; Cardiovascular Pack</h1>
  <div class="subtitle">★★★★★ Alveoli · Haemoglobin · Heart · Xylem/Phloem · 9BI0</div>
</header>

<div class="topic-bar" id="topicBar"></div>

<div class="progress-row">
  <span id="progressLabel">1 / 1</span>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <span id="knownLabel">✓ 0</span>
</div>

<div class="stage">
  <div class="card" id="card">
    <div class="face front">
      <span class="tag" id="tagFront">Topic 1</span>
      <span class="card-index" id="idxFront">1/1</span>
      <div class="q-text" id="qText">Loading…</div>
      <div class="tap-hint">tap to flip</div>
    </div>
    <div class="face back">
      <span class="tag" id="tagBack">Topic 1</span>
      <span class="card-index" id="idxBack">1/1</span>
      <div class="a-label">Answer</div>
      <div class="a-text" id="aText"></div>
    </div>
  </div>
</div>

<div class="rate-row" id="rateRow">
  <div class="rate-btn again" id="rateAgain">✗ Again</div>
  <div class="rate-btn hard" id="rateHard">~ Shaky</div>
  <div class="rate-btn good" id="rateGood">✓ Got it</div>
</div>

<div class="controls">
  <div class="btn icon-only" id="prevBtn">‹</div>
  <div class="btn wide" id="shuffleBtn">🔀 Shuffle</div>
  <div class="btn icon-only" id="nextBtn">›</div>
</div>

<div class="footer-row">
  <span id="deckLabel">All Topics · 0 cards</span>
  <span class="link" id="resetLink">reset progress</span>
</div>

<script>
/* ---------------- DATA ---------------- */
const DECK = [];
let uid = 0;
function add(topic, q, a){ DECK.push({id: uid++, topic, q, a}); }

/* ===== LEARNING OUTCOMES ===== */
const LO = "Learning Outcomes";
add(LO,"List the eight highest-priority learning outcomes for this topic.","Explain adaptations of gas exchange surfaces; describe ventilation and gas exchange in mammals; explain oxygen transport by haemoglobin; describe the structure and function of the heart; explain the cardiac cycle; analyse causes of coronary heart disease; compare transport systems in plants and animals; interpret physiological data.");
add(LO,"Why is this one of the highest-priority topics for revision?","Questions on gas exchange and transport appear almost every year, often combining physiology, data analysis, practical work and application to unfamiliar scenarios.");

/* ===== GAS EXCHANGE & HAEMOGLOBIN Q1-5 ===== */
const GE = "Gas Exchange & Haemoglobin";
add(GE,"★★★★★ Q1 (6 marks). Explain how alveoli are adapted for efficient gas exchange.","Alveoli provide a very large surface area for diffusion because they are numerous. Their walls are one cell thick, giving a short diffusion distance. The moist lining allows gases to dissolve before diffusing. A dense capillary network and continuous blood flow remove oxygen and deliver carbon dioxide, while ventilation maintains a steep concentration gradient.");
add(GE,"Q1 — Examiner Keywords: which 6 terms must you include?","Large surface area; thin walls; moist surface; rich blood supply; ventilation; steep concentration gradient.");
add(GE,"★★★★★ Q2. Explain why oxygen diffuses from alveoli into the blood.","The oxygen concentration (or partial pressure) is higher in the alveoli than in deoxygenated blood. Oxygen diffuses down its concentration gradient across the alveolar epithelium, capillary endothelium and plasma into red blood cells, where it binds to haemoglobin. Continuous blood flow maintains the gradient.");
add(GE,"★★★★★ Q3. Explain how haemoglobin transports oxygen.","Each haemoglobin molecule contains four haem groups, each capable of binding one oxygen molecule. Oxygen binds reversibly to form oxyhaemoglobin in the lungs, where oxygen concentration is high. In respiring tissues, where oxygen concentration is lower, oxyhaemoglobin dissociates and releases oxygen.");
add(GE,"★★★★★ Q4. Explain the significance of the oxygen dissociation curve.","The curve is sigmoid because binding of the first oxygen molecule increases haemoglobin's affinity for oxygen (cooperative binding). This allows efficient loading in the lungs and unloading in actively respiring tissues.");
add(GE,"★★★★★ Q5. Explain the Bohr effect.","Respiring tissues produce carbon dioxide, lowering pH. The reduced pH decreases haemoglobin's affinity for oxygen, causing the oxygen dissociation curve to shift right. More oxygen is released where it's most needed.");

/* ===== HEART & CIRCULATION Q6-10 ===== */
const HC = "Heart & Circulation";
add(HC,"★★★★★ Q6. Describe the pathway of blood through the heart.","Vena cava → right atrium → right ventricle → pulmonary artery → lungs → pulmonary veins → left atrium → left ventricle → aorta → body tissues.");
add(HC,"★★★★★ Q7. Explain the cardiac cycle.","Atrial systole: atria contract, forcing blood into the ventricles. Ventricular systole: ventricles contract, closing the atrioventricular valves and opening the semilunar valves, pumping blood into the pulmonary artery/aorta. Diastole: the heart relaxes and refills with blood.");
add(HC,"★★★★★ Q8. Explain how coronary heart disease develops.","LDL cholesterol accumulates within coronary artery walls, forming atheromatous plaques. These narrow the arterial lumen and reduce blood flow to the cardiac muscle. Reduced oxygen delivery decreases aerobic respiration and ATP production, causing angina and increasing the risk of myocardial infarction.");
add(HC,"★★★★★ Q9. Explain why exercise increases heart rate.","During exercise, skeletal muscles require more ATP. Aerobic respiration therefore increases, requiring greater oxygen and glucose delivery. Heart rate increases to raise cardiac output, delivering more oxygenated blood while removing carbon dioxide.");
add(HC,"★★★★☆ Q10. Compare arteries, veins and capillaries — 4 features.","Wall: thick / thin / one cell thick. Lumen: narrow / wide / very narrow. Pressure: high / low / low. Valves: no / yes / no.");

/* ===== PLANT TRANSPORT Q11-12 ===== */
const PT = "Plant Transport";
add(PT,"★★★★★ Q11. Explain how water moves through the xylem.","Water enters root hair cells by osmosis. It moves across the root into the xylem and is transported upwards by the cohesion-tension mechanism. Evaporation from the leaves creates tension, while cohesion between water molecules maintains a continuous column.");
add(PT,"★★★★★ Q12. Explain translocation in the phloem.","Sucrose is actively loaded into companion cells and sieve tube elements, lowering water potential. Water enters from the xylem by osmosis, increasing hydrostatic pressure. This pressure drives mass flow of sucrose from sources to sinks, where sucrose is unloaded.");

/* ===== PRACTICAL QUESTIONS Q13-14 ===== */
const PQ = "Practical Questions";
add(PQ,"★★★★★ Q13. Potometer investigation — what is the independent variable, and what does the potometer actually measure?","Independent variable depends on the investigation (e.g. temperature, light intensity, humidity, wind speed). The potometer measures water uptake — this is only an estimate of transpiration, not a direct measurement.");
add(PQ,"★★★★★ Q13. What must be controlled in a potometer investigation?","Temperature, humidity, light intensity and air movement (whichever isn't the independent variable).");
add(PQ,"★★★★☆ Q14. Evaluate a heart rate investigation — 5 typical improvements.","Increase sample size; repeat measurements; standardise exercise intensity and duration; allow equal recovery periods between trials; control environmental conditions.");

/* ===== TOP 10 MISTAKES ===== */
const MX = "Top 10 Mistakes";
add(MX,"❌ 'Oxygen is actively transported into blood.' What's correct?","✔ Oxygen diffuses down its concentration gradient — no ATP is needed.");
add(MX,"❌ 'Haemoglobin permanently binds oxygen.' What's correct?","✔ Oxygen binding is reversible — that's what allows unloading in tissues.");
add(MX,"❌ 'Veins carry only deoxygenated blood.' What's correct?","✔ Pulmonary veins carry oxygenated blood (from lungs to heart) — the exception to the general rule.");
add(MX,"❌ 'Xylem transports sugars.' What's correct?","✔ Xylem transports water and mineral ions — sucrose is transported in the phloem.");
add(MX,"❌ 'Phloem transport is passive.' What's correct?","✔ Phloem loading requires active transport (ATP) to move sucrose into sieve tubes against its gradient.");
add(MX,"❌ 'Potometers measure transpiration directly.' What's correct?","✔ They estimate transpiration by measuring water uptake — not all water taken up is lost via transpiration.");
add(MX,"❌ 'Capillaries have thick walls.' What's correct?","✔ Capillary walls are one cell thick, enabling efficient exchange.");
add(MX,"❌ 'Heart rate equals cardiac output.' What's correct?","✔ Cardiac output = heart rate × stroke volume — heart rate alone is not cardiac output.");
add(MX,"❌ 'Valves generate blood pressure.' What's correct?","✔ Valves prevent backflow of blood — they don't generate pressure themselves.");
add(MX,"❌ 'Cohesion is between water and xylem walls.' What's correct?","✔ Cohesion is between water molecules; adhesion is between water and the xylem walls.");

/* ===== A★ MEMORY CHECKLIST ===== */
const MC = "A★ Memory Checklist";
add(MC,"Define: Alveolar adaptations (recap in one line).","Large surface area, walls one cell thick, moist lining, rich capillary supply, maintained by ventilation and blood flow.");
add(MC,"Define: Cooperative binding and the oxygen dissociation curve.","Binding of the first O₂ molecule to haemoglobin changes its shape, increasing affinity for further O₂ — produces the sigmoid dissociation curve, enabling efficient loading/unloading.");
add(MC,"Define: Bohr effect (recap in one line).","Rising CO₂ lowers pH, reducing haemoglobin's O₂ affinity and shifting the dissociation curve right — more O₂ released in actively respiring tissue.");
add(MC,"Define: Cardiac output.","The volume of blood pumped by the heart per minute; Cardiac Output = Heart Rate × Stroke Volume.");
add(MC,"Define: Atheroma / coronary heart disease.","LDL cholesterol builds up in artery walls forming atheromatous plaques, narrowing the lumen, restricting blood flow to cardiac muscle, and increasing risk of angina or myocardial infarction.");
add(MC,"Define: Cohesion-tension theory (recap in one line).","Transpiration creates tension in the xylem; cohesion between water molecules maintains a continuous column pulled upward; adhesion to xylem walls supports it.");
add(MC,"Define: Source and sink in phloem translocation.","Source: where sucrose is produced/loaded (e.g. leaves). Sink: where sucrose is unloaded and used/stored (e.g. roots, fruits, growing tissue).");
add(MC,"Define: Potometer.","Apparatus that measures the rate of water uptake by a cut shoot, used as an estimate of the transpiration rate.");

/* ===== EXPECTED EXAM FREQUENCY ===== */
const EF = "Exam Frequency";
add(EF,"Rate the exam probability of: alveoli, haemoglobin, cardiac cycle, coronary heart disease, xylem, phloem, potometer practical.","All ★★★★★ — these concepts form the backbone of Topic 4 and are repeatedly assessed through direct questions, practical investigations and synoptic applications.");
add(EF,"What comes next in the A★ Examiner Prediction Pack series?","Prediction 7: Immunity, Microbiology and Infectious Disease — the 20 highest-probability questions, bacteria/viruses/pathogens, the immune response, vaccination, antibiotics and antimicrobial resistance, examiner-favourite practical questions, full A★ model answers and common misconceptions.");

/* ---------------- APP LOGIC ---------------- */
const TOPICS = [LO, GE, HC, PT, PQ, MX, MC, EF];
let currentTopic = "All";
let order = [];
let pos = 0;
let known = new Set();
let flipped = false;

const STORAGE_KEY = "bio_cardio_progress_v1";

function loadProgress(){
  try{
    const raw = localStorageSafe.getItem(STORAGE_KEY);
    if(raw){ known = new Set(JSON.parse(raw)); }
  }catch(e){}
}
function saveProgress(){
  try{ localStorageSafe.setItem(STORAGE_KEY, JSON.stringify([...known])); }catch(e){}
}
/* In-memory fallback (artifacts / private browsing safe) */
const memStore = {};
const localStorageSafe = {
  getItem(k){ try{ return window.localStorage.getItem(k); }catch(e){ return memStore[k] || null; } },
  setItem(k,v){ try{ window.localStorage.setItem(k,v); }catch(e){ memStore[k]=v; } }
};

function buildTopicBar(){
  const bar = document.getElementById('topicBar');
  const all = ["All", ...TOPICS];
  bar.innerHTML = "";
  all.forEach(t=>{
    const chip = document.createElement('div');
    chip.className = 'chip' + (t===currentTopic ? ' active':'');
    chip.textContent = t==="All" ? "All Topics" : t;
    chip.onclick = ()=>{ currentTopic = t; setupDeck(); buildTopicBar(); };
    bar.appendChild(chip);
  });
}

function setupDeck(){
  const filtered = currentTopic==="All" ? DECK : DECK.filter(c=>c.topic===currentTopic);
  order = filtered.map(c=>c.id);
  pos = 0;
  flipped = false;
  render();
}

function shuffleDeck(){
  for(let i=order.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [order[i],order[j]] = [order[j],order[i]];
  }
  pos = 0;
  flipped = false;
  render();
}

function currentCard(){
  const id = order[pos];
  return DECK.find(c=>c.id===id);
}

function render(){
  const card = currentCard();
  const cardEl = document.getElementById('card');
  cardEl.classList.remove('flipped');
  flipped = false;
  if(!card){
    document.getElementById('qText').textContent = "No cards in this topic.";
    document.getElementById('aText').innerHTML = "";
    return;
  }
  document.getElementById('qText').innerHTML = card.q;
  document.getElementById('aText').innerHTML = card.a;
  const shortTag = card.topic;
  document.getElementById('tagFront').textContent = shortTag;
  document.getElementById('tagBack').textContent = shortTag;
  document.getElementById('idxFront').textContent = (pos+1)+"/"+order.length;
  document.getElementById('idxBack').textContent = (pos+1)+"/"+order.length;
  document.getElementById('progressLabel').textContent = (pos+1)+" / "+order.length;
  document.getElementById('progressFill').style.width = order.length ? (((pos+1)/order.length)*100)+"%" : "0%";
  document.getElementById('knownLabel').textContent = "✓ "+[...known].filter(id=>order.includes(id)).length;
  document.getElementById('deckLabel').textContent = (currentTopic==="All"?"All Topics":currentTopic) + " · " + order.length + " cards";
}

function flip(){
  const cardEl = document.getElementById('card');
  flipped = !flipped;
  cardEl.classList.toggle('flipped', flipped);
}

function next(){
  if(order.length===0) return;
  pos = (pos+1) % order.length;
  render();
}
function prev(){
  if(order.length===0) return;
  pos = (pos-1+order.length) % order.length;
  render();
}

function rate(status){
  const card = currentCard();
  if(!card) return;
  if(status==="good"){ known.add(card.id); }
  else { known.delete(card.id); }
  saveProgress();
  next();
}

/* Events */
document.getElementById('card').addEventListener('click', flip);
document.getElementById('nextBtn').addEventListener('click', next);
document.getElementById('prevBtn').addEventListener('click', prev);
document.getElementById('shuffleBtn').addEventListener('click', shuffleDeck);
document.getElementById('rateAgain').addEventListener('click', ()=>rate('again'));
document.getElementById('rateHard').addEventListener('click', ()=>rate('hard'));
document.getElementById('rateGood').addEventListener('click', ()=>rate('good'));
document.getElementById('resetLink').addEventListener('click', ()=>{
  known = new Set();
  saveProgress();
  render();
});

/* Swipe support */
let touchStartX = null, touchStartY = null;
const stage = document.querySelector('.stage');
stage.addEventListener('touchstart', e=>{
  touchStartX = e.changedTouches[0].clientX;
  touchStartY = e.changedTouches[0].clientY;
}, {passive:true});
stage.addEventListener('touchend', e=>{
  if(touchStartX===null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)){
    if(dx < 0) next(); else prev();
  }
  touchStartX = null; touchStartY = null;
}, {passive:true});

/* Keyboard support (desktop) */
document.addEventListener('keydown', e=>{
  if(e.key==="ArrowRight") next();
  else if(e.key==="ArrowLeft") prev();
  else if(e.key===" "){ e.preventDefault(); flip(); }
  else if(e.key==="1") rate('again');
  else if(e.key==="2") rate('hard');
  else if(e.key==="3") rate('good');
});

/* Init */
loadProgress();
buildTopicBar();
setupDeck();
</script>
</body>
</html>
