<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Biology Membrane Structure & Fluid Mosaic Pack — 9BI0</title>
<style>
  :root{
    --bg:#0d1117;
    --card-bg:#161b22;
    --card-back:#1c2333;
    --border:#2a3346;
    --text:#e6edf3;
    --text-dim:#8b96a5;
    --accent:#4fd1c5;
    --accent2:#a78bfa;
    --good:#3fb950;
    --warn:#f0b429;
    --danger:#f85149;
    --shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overscroll-behavior:none;
  }
  body{
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh;
    min-height:-webkit-fill-available;
    padding: env(safe-area-inset-top,16px) 16px calc(env(safe-area-inset-bottom,16px) + 12px);
  }
  header{
    width:100%; max-width:520px; text-align:center; padding-top:10px;
  }
  h1{
    font-size:1.05rem; font-weight:700; margin:4px 0 2px; letter-spacing:0.2px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .subtitle{ font-size:0.75rem; color:var(--text-dim); margin-bottom:10px;}

  .topic-bar{
    width:100%; max-width:520px;
    display:flex; gap:6px; overflow-x:auto; padding:4px 2px 10px;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .topic-bar::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;
    padding:7px 12px;
    border-radius:20px;
    background:var(--card-bg);
    border:1px solid var(--border);
    color:var(--text-dim);
    font-size:0.72rem;
    font-weight:600;
    white-space:nowrap;
    cursor:pointer;
    transition:all .15s ease;
  }
  .chip.active{
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    color:#0d1117;
    border-color:transparent;
  }

  .progress-row{
    width:100%; max-width:520px;
    display:flex; align-items:center; justify-content:space-between;
    font-size:0.72rem; color:var(--text-dim); margin-bottom:8px; padding:0 2px;
  }
  .progress-track{
    flex:1; height:5px; background:var(--border); border-radius:4px; margin:0 10px; overflow:hidden;
  }
  .progress-fill{
    height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); width:0%;
    transition:width .25s ease;
  }

  .stage{
    width:100%; max-width:520px;
    flex:1;
    display:flex; align-items:center; justify-content:center;
    perspective:1400px;
    margin: 6px 0 14px;
    min-height:340px;
  }
  .card{
    width:100%;
    height:360px;
    position:relative;
    transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.2,.9,.3,1);
    cursor:pointer;
  }
  .card.flipped{ transform:rotateY(180deg); }
  .face{
    position:absolute; inset:0;
    backface-visibility:hidden;
    border-radius:20px;
    border:1px solid var(--border);
    box-shadow:var(--shadow);
    display:flex; flex-direction:column;
    padding:22px;
    overflow-y:auto;
  }
  .face::-webkit-scrollbar{width:4px;}
  .face::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}
  .front{
    background:radial-gradient(circle at 30% 20%, #1c2333, var(--card-bg) 70%);
    justify-content:center; align-items:center; text-align:center;
  }
  .back{
    background:radial-gradient(circle at 70% 20%, #232c44, var(--card-back) 70%);
    transform:rotateY(180deg);
    justify-content:flex-start; align-items:flex-start; text-align:left;
  }
  .tag{
    position:absolute; top:14px; left:14px;
    font-size:0.62rem; font-weight:700; letter-spacing:0.5px; text-transform:uppercase;
    color:var(--accent);
    background:rgba(79,209,197,0.1);
    border:1px solid rgba(79,209,197,0.3);
    padding:3px 8px; border-radius:20px;
  }
  .card-index{
    position:absolute; top:14px; right:14px;
    font-size:0.65rem; color:var(--text-dim);
  }
  .q-text{
    font-size:1.15rem; font-weight:600; line-height:1.4; margin-top:20px;
  }
  .tap-hint{
    position:absolute; bottom:14px; left:0; right:0; text-align:center;
    font-size:0.65rem; color:var(--text-dim);
  }
  .a-label{
    font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;
    color:var(--accent2); margin:20px 0 8px;
  }
  .a-text{
    font-size:1rem; line-height:1.5; font-weight:500;
  }
  .a-text ul{ margin:6px 0 0 18px; padding:0; }
  .a-text li{ margin-bottom:4px; }

  .controls{
    width:100%; max-width:520px;
    display:flex; align-items:center; gap:10px;
    margin-bottom:8px;
  }
  .btn{
    flex:1;
    background:var(--card-bg);
    border:1px solid var(--border);
    color:var(--text);
    padding:13px 10px;
    border-radius:14px;
    font-size:0.85rem;
    font-weight:600;
    display:flex; align-items:center; justify-content:center; gap:6px;
    cursor:pointer;
    -webkit-user-select:none; user-select:none;
    transition:transform .1s ease, background .15s ease;
  }
  .btn:active{ transform:scale(0.96); background:#1e2635; }
  .btn.wide{ flex:2; }
  .btn.icon-only{ flex:0 0 52px; font-size:1.1rem; }

  .rate-row{
    width:100%; max-width:520px;
    display:flex; gap:8px; margin-bottom:6px;
  }
  .rate-btn{
    flex:1;
    padding:11px 6px;
    border-radius:12px;
    border:1px solid var(--border);
    background:var(--card-bg);
    font-size:0.72rem;
    font-weight:700;
    text-align:center;
    cursor:pointer;
    -webkit-user-select:none; user-select:none;
  }
  .rate-btn.again{ color:var(--danger); }
  .rate-btn.hard{ color:var(--warn); }
  .rate-btn.good{ color:var(--good); }
  .rate-btn:active{ transform:scale(0.96); }

  .footer-row{
    width:100%; max-width:520px;
    display:flex; justify-content:space-between; align-items:center;
    font-size:0.68rem; color:var(--text-dim); margin-top:6px;
  }
  .footer-row span.link{
    color:var(--accent); cursor:pointer; font-weight:600;
  }

  .done-screen{
    width:100%; max-width:520px; text-align:center; padding:30px 10px;
  }
  .done-screen h2{ color:var(--good); font-size:1.3rem; margin-bottom:6px;}
  .done-screen p{ color:var(--text-dim); font-size:0.85rem; }

  @media (max-height:700px){
    .card{ height:310px; }
    .stage{ min-height:300px; }
  }
</style>

<body>

<header>
  <h1>Membrane Structure &amp; Fluid Mosaic</h1>
  <div class="subtitle">★★★★★ Vol.11 Prediction 1 · Topic 1 · Edexcel 9BI0</div>

<div class="topic-bar" id="topicBar"></div>

<div class="progress-row">
  <span id="progressLabel">1 / 1</span>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

</div>

<div class="stage">
  <div class="card" id="card">
    <div class="face front">
      <span class="tag" id="tagFront">Topic 1</span>
      <span class="card-index" id="idxFront">1/1</span>

      <div class="tap-hint">tap to flip</div>

      <span class="tag" id="tagBack">Topic 1</span>
      <span class="card-index" id="idxBack">1/1</span>

</div>

</div>

  <span id="deckLabel">All Topics · 0 cards</span>
  <span class="link" id="resetLink">reset progress</span>

<script>
/* ---------------- DATA ---------------- */
const DECK = [];
let uid = 0;
function add(topic, q, a){ DECK.push({id: uid++, topic, q, a}); }

/* ===== WHY THIS MATTERS ===== */
const WM = "Why This Matters";
add(WM,"Why is Membrane Structure a ★★★★★ prediction?","It's one of the highest-frequency topics in 9BI0 and forms the foundation for many later topics — diffusion, osmosis, active transport, cell signalling, immunity and nerve transmission all build on it.");
add(WM,"Name five ways examiners typically assess this topic.","Direct explanation questions; structure-function questions; data interpretation based on membrane transport; practical investigations involving membrane permeability; synoptic questions linking membrane structure with transport processes.");
add(WM,"List the six specification-focus skills for this topic.","Describe the structure of the cell surface membrane using the fluid mosaic model; explain the arrangement of phospholipids within the bilayer; explain the functions of phospholipids, cholesterol, intrinsic proteins, extrinsic proteins, glycoproteins and glycolipids; explain selective permeability; relate membrane structure to diffusion, facilitated diffusion and active transport; apply membrane structure to unfamiliar biological contexts.");

/* ===== 20 HIGHEST-YIELD FACTS ===== */
const HF = "20 Highest-Yield Facts";
add(HF,"Fact 1. What does the cell surface membrane mainly consist of?","A phospholipid bilayer with embedded proteins.");
add(HF,"Fact 2. Why is the membrane described as 'fluid'?","Because phospholipids and some proteins move laterally.");
add(HF,"Fact 3. Why is the membrane described as a 'mosaic'?","Because proteins are distributed irregularly throughout the phospholipid bilayer.");
add(HF,"Fact 4. Are phospholipid phosphate heads hydrophilic or hydrophobic?","Hydrophilic.");
add(HF,"Fact 5. Are fatty acid tails hydrophilic or hydrophobic?","Hydrophobic.");
add(HF,"Fact 6. Which way do the hydrophobic tails face, and what does this form?","Inwards, forming the non-polar interior of the membrane.");
add(HF,"Fact 7. Which way do the hydrophilic heads face?","The aqueous environments inside and outside the cell.");
add(HF,"Fact 8. Which molecules diffuse directly through the phospholipid bilayer? Give two examples.","Small non-polar molecules — e.g. oxygen and carbon dioxide.");
add(HF,"Fact 9. What do large polar molecules need to cross the membrane?","Membrane proteins.");
add(HF,"Fact 10. What do channel proteins provide, and for what?","Hydrophilic pores for ions and certain polar molecules.");
add(HF,"Fact 11. What do carrier proteins do?","Bind specific substances and change shape during transport.");
add(HF,"Fact 12. Is facilitated diffusion active or passive, and does it need ATP?","Passive — it does not require ATP.");
add(HF,"Fact 13. What does active transport require?","ATP and carrier proteins.");
add(HF,"Fact 14. What direction does active transport move substances?","Against their concentration gradient.");
add(HF,"Fact 15. What does cholesterol regulate?","Membrane fluidity and stability.");
add(HF,"Fact 16. What is the function of glycoproteins?","Cell recognition and receptor-mediated signalling.");
add(HF,"Fact 17. What is the function of glycolipids?","Cell recognition and membrane stability.");
add(HF,"Fact 18. What term describes a membrane that lets only certain substances cross?","Selectively permeable.");
add(HF,"Fact 19. Besides transport, what other roles can membrane proteins have?","They can also function as enzymes and receptors.");
add(HF,"Fact 20. What three broader cell processes is membrane structure directly related to?","Transport, communication and homeostasis.");
add(HF,"A★ Memory Booster — what's the 6-step sequence that appears repeatedly across Papers 1-3?","Phospholipid bilayer → fluid mosaic → selective permeability → diffusion → facilitated diffusion → active transport.");

/* ===== CORE QUESTIONS Q1-10 ===== */
const CQ = "Core Questions Q1-10";
add(CQ,"★★★★★ Q1 (6 marks). Explain how the structure of the cell surface membrane enables it to control the movement of substances into and out of cells.","The membrane consists of a phospholipid bilayer with hydrophilic heads facing the aqueous environments and hydrophobic tails facing inwards. Small non-polar molecules (O₂, CO₂) diffuse directly through the bilayer. Polar molecules/ions need channel proteins (hydrophilic pores) or carrier proteins (which change shape) to cross. Facilitated diffusion moves substances down their gradient with no ATP; active transport uses ATP to move substances against their gradient. Cholesterol regulates fluidity/stability. Because only certain substances cross via specific pathways, the membrane is selectively permeable.");
add(CQ,"Q1 — Common Student Mistakes to avoid.","❌ Stating all molecules pass through the bilayer. ❌ Confusing facilitated diffusion with active transport. ❌ Forgetting active transport requires ATP. ❌ Describing cholesterol only as 'strengthening' without explaining fluidity. ❌ Calling the membrane 'freely permeable' instead of selectively permeable.");
add(CQ,"★★★★★ Q2 (4 marks). Explain why the cell surface membrane is described as a fluid mosaic.","Fluid: phospholipids and some membrane proteins move laterally, keeping the membrane flexible. Mosaic: different proteins (channel, carrier, glycoproteins) are embedded irregularly throughout the bilayer rather than forming a continuous layer. This arrangement lets the membrane carry out multiple functions — transport, cell recognition and cell signalling.");
add(CQ,"★★★★★ Q3 (4 marks). Describe the functions of phospholipids within the cell surface membrane.","Form the basic bilayer structure; hydrophilic heads face the aqueous environments inside/outside the cell; hydrophobic tails face inwards, creating a barrier to water-soluble substances; allow small non-polar molecules to diffuse directly through; contribute to membrane fluidity as they move laterally.");
add(CQ,"★★★★★ Q4 (3 marks). Explain the role of cholesterol in maintaining membrane structure.","Cholesterol fits between phospholipid molecules and regulates membrane fluidity. At high temperatures it restricts phospholipid movement, reducing excessive fluidity. At low temperatures it prevents phospholipids packing too closely, maintaining flexibility and stability.");
add(CQ,"★★★★★ Q5 (4 marks). Compare channel proteins and carrier proteins.","Channel proteins: form hydrophilic pores; allow ions/polar molecules through by facilitated diffusion only; don't change shape. Carrier proteins: bind a specific substance and change shape to transport it; used in both facilitated diffusion (no ATP) and active transport (with ATP).");
add(CQ,"★★★★★ Q6 (4 marks). Explain why the cell surface membrane is selectively permeable.","The phospholipid bilayer only allows small non-polar molecules through directly. Polar molecules and ions can only cross via specific channel or carrier proteins, which are selective for particular substances. This combination means only certain substances can cross, giving controlled, selective movement rather than free passage.");
add(CQ,"★★★★☆ Q7 (3 marks). Describe how oxygen enters a mammalian cell through the cell surface membrane.","Oxygen is a small, non-polar molecule, so it diffuses directly through the hydrophobic phospholipid bilayer, moving down its concentration gradient — no membrane protein or ATP is needed.");
add(CQ,"★★★★☆ Q8 (4 marks). Explain why sodium ions cannot diffuse directly through the phospholipid bilayer.","Sodium ions are charged and hydrophilic, so they cannot pass through the hydrophobic fatty acid tail region of the bilayer. They need a hydrophilic pathway — a channel protein or carrier protein — to cross the membrane.");
add(CQ,"★★★★☆ Q9 (6 marks). Compare facilitated diffusion with active transport.","Both use specific membrane proteins (mainly carrier proteins) and can transport polar/charged substances. Facilitated diffusion moves substances down their concentration gradient and needs no ATP; active transport moves substances against their gradient and requires ATP from respiration. Active transport is therefore selective and energy-dependent in a way facilitated diffusion is not.");
add(CQ,"★★★★☆ Q10 (5 marks). Explain how carrier proteins function during active transport.","A specific molecule binds to the carrier protein on one side of the membrane. ATP is hydrolysed, releasing energy and a phosphate group, which binds to the carrier protein and causes it to change shape. This shape change moves the bound molecule across the membrane against its concentration gradient, after which it's released and the carrier protein returns to its original shape.");

/* ===== CORE QUESTIONS Q11-20 ===== */
const CQ2 = "Core Questions Q11-20";
add(CQ2,"★★★★☆ Q11 (3 marks). Describe the functions of glycoproteins.","Glycoproteins (proteins with attached carbohydrate chains) act in cell recognition, allowing cells to identify each other (e.g. self vs non-self) and function as receptors for hormones/signalling molecules.");
add(CQ2,"★★★★☆ Q12 (4 marks). Explain the importance of membrane receptors in cell signalling.","Receptor proteins (often glycoproteins) have a binding site complementary to a specific signalling molecule (e.g. a hormone). Binding triggers a response inside the cell, such as activating an enzyme cascade, without the signalling molecule needing to enter the cell — allowing precise, targeted communication between cells.");
add(CQ2,"★★★★☆ Q13 (6 marks, data). A graph shows membrane permeability increasing with temperature. Explain the results.","As temperature rises, phospholipids and proteins gain kinetic energy and move more, increasing membrane fluidity. This creates larger/more frequent gaps between phospholipids, so more substances (e.g. pigments) can leak across — increasing measured permeability. At very high temperatures, membrane proteins may also denature, further increasing permeability.");
add(CQ2,"★★★★☆ Q14 (6 marks, practical). Evaluate an investigation into membrane permeability using beetroot tissue.","Consider: using beetroot discs of identical size (controls surface area); washing discs to remove pigment released during cutting; using a water bath for precise temperature control; using a colorimeter rather than judging colour by eye; repeating at each temperature and calculating a mean to improve reliability.");
add(CQ2,"★★★★☆ Q15 (5 marks). Explain why membrane fluidity changes with temperature.","At low temperatures, phospholipids have less kinetic energy and pack closely together, making the membrane more rigid — cholesterol prevents this by stopping tight packing. At high temperatures, phospholipids gain kinetic energy and move more freely, increasing fluidity — cholesterol restricts this excess movement, helping stabilise the membrane across a range of temperatures.");
add(CQ2,"★★★☆☆ Q16 (3 marks). Describe how phospholipids are arranged within the membrane.","Phospholipids form a bilayer (two layers), with hydrophilic phosphate heads facing outward on both sides (towards the aqueous environments) and hydrophobic fatty acid tails facing inward, meeting in the centre of the membrane.");
add(CQ2,"★★★☆☆ Q17 (5 marks). Explain why membrane proteins are essential for cell survival.","Membrane proteins enable transport of substances (ions, glucose, amino acids) that cannot cross the bilayer directly, allow cell recognition and communication via receptors, and some act as enzymes catalysing reactions at the membrane surface. Without them, cells couldn't obtain nutrients, remove waste, or respond to signals — essential processes for survival.");
add(CQ2,"★★★☆☆ Q18 (4 marks). Suggest why red blood cells require selectively permeable membranes.","Red blood cells need to control water movement (by osmosis) to avoid lysis (in hypotonic conditions) or crenation (in hypertonic conditions), while still allowing O₂/CO₂ to diffuse freely and glucose/ions to be regulated — a selectively permeable membrane allows this fine control of internal conditions.");
add(CQ2,"★★★☆☆ Q19 (4 marks). Explain how the fluid mosaic model supports membrane flexibility.","Because phospholipids and proteins aren't rigidly fixed in place but can move laterally within the bilayer, the membrane can bend and reshape — important for processes like endocytosis, exocytosis, and cell movement — while still maintaining its barrier function.");
add(CQ2,"★★★☆☆ Q20 (6 marks). A scientist removes cholesterol from a cell membrane. Predict and explain the effects on membrane structure and function.","Without cholesterol, the membrane would become more fluid and less stable — especially at high temperatures, where phospholipids would move too freely, and at low temperatures, where the membrane might become excessively rigid without cholesterol preventing tight packing. This could increase permeability to substances that would normally be excluded, disrupt selective permeability, and potentially destabilise the membrane structure.");

/* ===== RAPID REVISION SUMMARY ===== */
const RR = "Rapid Revision Summary";
add(RR,"Complete the phrase: 'Fluid → ___'","Phospholipids and some proteins move laterally.");
add(RR,"Complete the phrase: 'Mosaic → ___'","Proteins are embedded irregularly throughout the bilayer.");
add(RR,"What forms the basic membrane structure?","The phospholipid bilayer.");
add(RR,"Which membrane component transports ions and some polar molecules without changing shape?","Channel proteins.");
add(RR,"Which membrane component transports specific substances and is used in both facilitated diffusion and active transport?","Carrier proteins.");
add(RR,"When is ATP required for membrane transport?","Only for active transport.");
add(RR,"What does cholesterol regulate?","Membrane fluidity and stability.");
add(RR,"What does selective permeability allow?","Controlled movement of substances across the membrane.");

/* ===== SYNOPTIC LINKS ===== */
const SL = "Synoptic Links";
add(SL,"How does membrane structure link to Topic 2?","Diffusion, osmosis and active transport all depend on the membrane structures covered here.");
add(SL,"How does membrane structure link to Topic 4?","Absorption in the small intestine and kidney tubules relies on membrane transport proteins.");
add(SL,"How does membrane structure link to Topic 5?","ATP supply (from respiration) is what powers active transport across membranes.");
add(SL,"How does membrane structure link to Topic 6?","Cell recognition during immune responses depends on glycoproteins/glycolipids in the membrane.");
add(SL,"How does membrane structure link to Topic 9?","Nerve transmission relies on receptor proteins and channel proteins in neuronal membranes.");

/* ===== FINAL EXAM TIPS ===== */
const FT = "Final Exam Tips";
add(FT,"What's the single most important rule for answering membrane questions?","Always link structure to function — simply naming membrane components is rarely enough for full marks. Explain how each component contributes to transport, stability or cell communication.");
add(FT,"Give the structure→function link for: hydrophobic core.","Prevents free passage of ions.");
add(FT,"Give the structure→function link for: channel proteins.","Allow facilitated diffusion of specific substances.");
add(FT,"Give the structure→function link for: carrier proteins + ATP.","Enable active transport against a concentration gradient.");
add(FT,"Give the structure→function link for: cholesterol.","Regulates membrane fluidity.");

/* ---------------- APP LOGIC ---------------- */
const TOPICS = [WM, HF, CQ, CQ2, RR, SL, FT];
let currentTopic = "All";
let order = [];
let pos = 0;
let known = new Set();
let flipped = false;

const STORAGE_KEY = "bio_membranestructure_progress_v1";

function loadProgress(){
  try{
    const raw = localStorageSafe.getItem(STORAGE_KEY);
    if(raw){ known = new Set(JSON.parse(raw)); }
  }catch(e){}
}
function saveProgress(){
  try{ localStorageSafe.setItem(STORAGE_KEY, JSON.stringify([...known])); }catch(e){}
}
/* In-memory fallback (artifacts / private browsing safe) */
const memStore = {};
const localStorageSafe = {
  getItem(k){ try{ return window.localStorage.getItem(k); }catch(e){ return memStore[k] || null; } },
  setItem(k,v){ try{ window.localStorage.setItem(k,v); }catch(e){ memStore[k]=v; } }
};

function buildTopicBar(){
  const bar = document.getElementById('topicBar');
  const all = ["All", ...TOPICS];
  bar.innerHTML = "";
  all.forEach(t=>{
    const chip = document.createElement('div');
    chip.className = 'chip' + (t===currentTopic ? ' active':'');
    chip.textContent = t==="All" ? "All Topics" : t;
    chip.onclick = ()=>{ currentTopic = t; setupDeck(); buildTopicBar(); };
    bar.appendChild(chip);
  });
}

function setupDeck(){
  const filtered = currentTopic==="All" ? DECK : DECK.filter(c=>c.topic===currentTopic);
  order = filtered.map(c=>c.id);
  pos = 0;
  flipped = false;
  render();
}

function shuffleDeck(){
  for(let i=order.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [order[i],order[j]] = [order[j],order[i]];
  }
  pos = 0;
  flipped = false;
  render();
}

function currentCard(){
  const id = order[pos];
  return DECK.find(c=>c.id===id);
}

function render(){
  const card = currentCard();
  const cardEl = document.getElementById('card');
  cardEl.classList.remove('flipped');
  flipped = false;
  if(!card){
    document.getElementById('qText').textContent = "No cards in this topic.";
    document.getElementById('aText').innerHTML = "";
    return;
  }
  document.getElementById('qText').innerHTML = card.q;
  document.getElementById('aText').innerHTML = card.a;
  const shortTag = card.topic;
  document.getElementById('tagFront').textContent = shortTag;
  document.getElementById('tagBack').textContent = shortTag;
  document.getElementById('idxFront').textContent = (pos+1)+"/"+order.length;
  document.getElementById('idxBack').textContent = (pos+1)+"/"+order.length;
  document.getElementById('progressLabel').textContent = (pos+1)+" / "+order.length;
  document.getElementById('progressFill').style.width = order.length ? (((pos+1)/order.length)*100)+"%" : "0%";
  document.getElementById('knownLabel').textContent = "✓ "+[...known].filter(id=>order.includes(id)).length;
  document.getElementById('deckLabel').textContent = (currentTopic==="All"?"All Topics":currentTopic) + " · " + order.length + " cards";
}

function flip(){
  const cardEl = document.getElementById('card');
  flipped = !flipped;
  cardEl.classList.toggle('flipped', flipped);
}

function next(){
  if(order.length===0) return;
  pos = (pos+1) % order.length;
  render();
}
function prev(){
  if(order.length===0) return;
  pos = (pos-1+order.length) % order.length;
  render();
}

function rate(status){
  const card = currentCard();
  if(!card) return;
  if(status==="good"){ known.add(card.id); }
  else { known.delete(card.id); }
  saveProgress();
  next();
}

/* Events */
document.getElementById('card').addEventListener('click', flip);
document.getElementById('nextBtn').addEventListener('click', next);
document.getElementById('prevBtn').addEventListener('click', prev);
document.getElementById('shuffleBtn').addEventListener('click', shuffleDeck);
document.getElementById('rateAgain').addEventListener('click', ()=>rate('again'));
document.getElementById('rateHard').addEventListener('click', ()=>rate('hard'));
document.getElementById('rateGood').addEventListener('click', ()=>rate('good'));
document.getElementById('resetLink').addEventListener('click', ()=>{
  known = new Set();
  saveProgress();
  render();
});

/* Swipe support */
let touchStartX = null, touchStartY = null;
const stage = document.querySelector('.stage');
stage.addEventListener('touchstart', e=>{
  touchStartX = e.changedTouches[0].clientX;
  touchStartY = e.changedTouches[0].clientY;
}, {passive:true});
stage.addEventListener('touchend', e=>{
  if(touchStartX===null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)){
    if(dx < 0) next(); else prev();
  }
  touchStartX = null; touchStartY = null;
}, {passive:true});

/* Keyboard support (desktop) */
document.addEventListener('keydown', e=>{
  if(e.key==="ArrowRight") next();
  else if(e.key==="ArrowLeft") prev();
  else if(e.key===" "){ e.preventDefault(); flip(); }
  else if(e.key==="1") rate('again');
  else if(e.key==="2") rate('hard');
  else if(e.key==="3") rate('good');
});

/* Init */
loadProgress();
buildTopicBar();
setupDeck();
</script>
</body>
</html>
