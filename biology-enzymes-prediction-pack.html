<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Biology Enzymes A★ Prediction Pack — 9BI0</title>
<style>
  :root{
    --bg:#0d1117;
    --card-bg:#161b22;
    --card-back:#1c2333;
    --border:#2a3346;
    --text:#e6edf3;
    --text-dim:#8b96a5;
    --accent:#4fd1c5;
    --accent2:#a78bfa;
    --good:#3fb950;
    --warn:#f0b429;
    --danger:#f85149;
    --shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overscroll-behavior:none;
  }
  body{
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh;
    min-height:-webkit-fill-available;
    padding: env(safe-area-inset-top,16px) 16px calc(env(safe-area-inset-bottom,16px) + 12px);
  }
  header{
    width:100%; max-width:520px; text-align:center; padding-top:10px;
  }
  h1{
    font-size:1.05rem; font-weight:700; margin:4px 0 2px; letter-spacing:0.2px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .subtitle{ font-size:0.75rem; color:var(--text-dim); margin-bottom:10px;}

  .topic-bar{
    width:100%; max-width:520px;
    display:flex; gap:6px; overflow-x:auto; padding:4px 2px 10px;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .topic-bar::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;
    padding:7px 12px;
    border-radius:20px;
    background:var(--card-bg);
    border:1px solid var(--border);
    color:var(--text-dim);
    font-size:0.72rem;
    font-weight:600;
    white-space:nowrap;
    cursor:pointer;
    transition:all .15s ease;
  }
  .chip.active{
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    color:#0d1117;
    border-color:transparent;
  }

  .progress-row{
    width:100%; max-width:520px;
    display:flex; align-items:center; justify-content:space-between;
    font-size:0.72rem; color:var(--text-dim); margin-bottom:8px; padding:0 2px;
  }
  .progress-track{
    flex:1; height:5px; background:var(--border); border-radius:4px; margin:0 10px; overflow:hidden;
  }
  .progress-fill{
    height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); width:0%;
    transition:width .25s ease;
  }

  .stage{
    width:100%; max-width:520px;
    flex:1;
    display:flex; align-items:center; justify-content:center;
    perspective:1400px;
    margin: 6px 0 14px;
    min-height:340px;
  }
  .card{
    width:100%;
    height:360px;
    position:relative;
    transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.2,.9,.3,1);
    cursor:pointer;
  }
  .card.flipped{ transform:rotateY(180deg); }
  .face{
    position:absolute; inset:0;
    backface-visibility:hidden;
    border-radius:20px;
    border:1px solid var(--border);
    box-shadow:var(--shadow);
    display:flex; flex-direction:column;
    padding:22px;
    overflow-y:auto;
  }
  .face::-webkit-scrollbar{width:4px;}
  .face::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}
  .front{
    background:radial-gradient(circle at 30% 20%, #1c2333, var(--card-bg) 70%);
    justify-content:center; align-items:center; text-align:center;
  }
  .back{
    background:radial-gradient(circle at 70% 20%, #232c44, var(--card-back) 70%);
    transform:rotateY(180deg);
    justify-content:flex-start; align-items:flex-start; text-align:left;
  }
  .tag{
    position:absolute; top:14px; left:14px;
    font-size:0.62rem; font-weight:700; letter-spacing:0.5px; text-transform:uppercase;
    color:var(--accent);
    background:rgba(79,209,197,0.1);
    border:1px solid rgba(79,209,197,0.3);
    padding:3px 8px; border-radius:20px;
  }
  .card-index{
    position:absolute; top:14px; right:14px;
    font-size:0.65rem; color:var(--text-dim);
  }
  .q-text{
    font-size:1.15rem; font-weight:600; line-height:1.4; margin-top:20px;
  }
  .tap-hint{
    position:absolute; bottom:14px; left:0; right:0; text-align:center;
    font-size:0.65rem; color:var(--text-dim);
  }
  .a-label{
    font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;
    color:var(--accent2); margin:20px 0 8px;
  }
  .a-text{
    font-size:1rem; line-height:1.5; font-weight:500;
  }
  .a-text ul{ margin:6px 0 0 18px; padding:0; }
  .a-text li{ margin-bottom:4px; }

  .controls{
    width:100%; max-width:520px;
    display:flex; align-items:center; gap:10px;
    margin-bottom:8px;
  }
  .btn{
    flex:1;
    background:var(--card-bg);
    border:1px solid var(--border);
    color:var(--text);
    padding:13px 10px;
    border-radius:14px;
    font-size:0.85rem;
    font-weight:600;
    display:flex; align-items:center; justify-content:center; gap:6px;
    cursor:pointer;
    -webkit-user-select:none; user-select:none;
    transition:transform .1s ease, background .15s ease;
  }
  .btn:active{ transform:scale(0.96); background:#1e2635; }
  .btn.wide{ flex:2; }
  .btn.icon-only{ flex:0 0 52px; font-size:1.1rem; }

  .rate-row{
    width:100%; max-width:520px;
    display:flex; gap:8px; margin-bottom:6px;
  }
  .rate-btn{
    flex:1;
    padding:11px 6px;
    border-radius:12px;
    border:1px solid var(--border);
    background:var(--card-bg);
    font-size:0.72rem;
    font-weight:700;
    text-align:center;
    cursor:pointer;
    -webkit-user-select:none; user-select:none;
  }
  .rate-btn.again{ color:var(--danger); }
  .rate-btn.hard{ color:var(--warn); }
  .rate-btn.good{ color:var(--good); }
  .rate-btn:active{ transform:scale(0.96); }

  .footer-row{
    width:100%; max-width:520px;
    display:flex; justify-content:space-between; align-items:center;
    font-size:0.68rem; color:var(--text-dim); margin-top:6px;
  }
  .footer-row span.link{
    color:var(--accent); cursor:pointer; font-weight:600;
  }

  .done-screen{
    width:100%; max-width:520px; text-align:center; padding:30px 10px;
  }
  .done-screen h2{ color:var(--good); font-size:1.3rem; margin-bottom:6px;}
  .done-screen p{ color:var(--text-dim); font-size:0.85rem; }

  @media (max-height:700px){
    .card{ height:310px; }
    .stage{ min-height:300px; }
  }
</style>
</head>
<body>

<header>
  <h1>Enzymes A★ Prediction Pack</h1>
  <div class="subtitle">★★★★★ Highest-Probability Topic · Edexcel 9BI0</div>
</header>

<div class="topic-bar" id="topicBar"></div>

<div class="progress-row">
  <span id="progressLabel">1 / 1</span>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <span id="knownLabel">✓ 0</span>
</div>

<div class="stage">
  <div class="card" id="card">
    <div class="face front">
      <span class="tag" id="tagFront">Topic 1</span>
      <span class="card-index" id="idxFront">1/1</span>
      <div class="q-text" id="qText">Loading…</div>
      <div class="tap-hint">tap to flip</div>
    </div>
    <div class="face back">
      <span class="tag" id="tagBack">Topic 1</span>
      <span class="card-index" id="idxBack">1/1</span>
      <div class="a-label">Answer</div>
      <div class="a-text" id="aText"></div>
    </div>
  </div>
</div>

<div class="rate-row" id="rateRow">
  <div class="rate-btn again" id="rateAgain">✗ Again</div>
  <div class="rate-btn hard" id="rateHard">~ Shaky</div>
  <div class="rate-btn good" id="rateGood">✓ Got it</div>
</div>

<div class="controls">
  <div class="btn icon-only" id="prevBtn">‹</div>
  <div class="btn wide" id="shuffleBtn">🔀 Shuffle</div>
  <div class="btn icon-only" id="nextBtn">›</div>
</div>

<div class="footer-row">
  <span id="deckLabel">All Topics · 0 cards</span>
  <span class="link" id="resetLink">reset progress</span>
</div>

<script>
/* ---------------- DATA ---------------- */
const DECK = [];
let uid = 0;
function add(topic, q, a){ DECK.push({id: uid++, topic, q, a}); }

/* ===== GROUP A — Core Knowledge ===== */
const GA = "Group A: Core Knowledge";
add(GA,"★★★★★ Q1. Explain how enzymes catalyse biochemical reactions.","Enzymes are globular proteins with a specific tertiary structure. The active site is complementary to the substrate. An enzyme-substrate complex forms. This lowers the activation energy needed for the reaction. Products are released, and the enzyme remains unchanged so it can be reused.");
add(GA,"★★★★★ Q2. Explain why enzymes are substrate-specific.","The active site's 3D shape is complementary to one particular substrate. Only substrates with the correct shape can bind successfully, forming an enzyme-substrate complex. Catalysis then occurs before the products are released.");
add(GA,"★★★★★ Q3. Explain how temperature affects enzyme activity (below the optimum).","Low temperature: low kinetic energy → fewer successful collisions → fewer enzyme-substrate complexes. As temperature increases: kinetic energy rises → more frequent successful collisions → reaction rate increases, up to the optimum where activity is maximum.");
add(GA,"★★★★★ Q3 continued. Explain what happens to enzyme activity above the optimum temperature.","Hydrogen and ionic bonds maintaining tertiary structure are disrupted. The tertiary structure changes shape, so the active site no longer fits the substrate. Fewer enzyme-substrate complexes form, and enzyme activity decreases — the enzyme is denatured.");

/* ===== GROUP B — pH ===== */
const GB = "Group B: pH";
add(GB,"★★★★★ Q4. Explain how pH affects enzyme activity.","Hydrogen ion concentration changes away from the optimum pH. This disrupts ionic and hydrogen bonds maintaining tertiary structure. The tertiary structure — and therefore the active site — changes shape. Fewer enzyme-substrate complexes form, so activity decreases.");

/* ===== GROUP C — Substrate Concentration ===== */
const GC = "Group C: Substrate Concentration";
add(GC,"★★★★★ Q5. Explain why reaction rate eventually levels off as substrate concentration increases.","Initially: more substrate molecules → increased collisions → more enzyme-substrate complexes form, so rate increases. Eventually: all active sites become occupied — the enzyme is saturated. Enzyme concentration becomes the limiting factor, so maximum reaction rate is reached and further substrate has no effect.");

/* ===== GROUP D — Enzyme Concentration ===== */
const GD = "Group D: Enzyme Concentration";
add(GD,"★★★★☆ Q6. Explain why increasing enzyme concentration increases reaction rate.","More active sites become available. More enzyme-substrate complexes form each second. Reaction rate increases, provided substrate remains in excess (otherwise substrate becomes the limiting factor).");

/* ===== GROUP E — Competitive Inhibition ===== */
const GE = "Group E: Competitive Inhibition";
add(GE,"★★★★★ Q7. Explain competitive inhibition.","The inhibitor has a molecular shape resembling the substrate. It binds reversibly to the active site. This prevents the substrate from binding, so fewer enzyme-substrate complexes form. Because binding is reversible, increasing substrate concentration can outcompete the inhibitor and overcome the inhibition.");

/* ===== GROUP F — Non-Competitive Inhibition ===== */
const GF = "Group F: Non-Competitive Inhibition";
add(GF,"★★★★☆ Q8. Explain non-competitive inhibition.","The inhibitor binds to an allosteric site (not the active site). This changes the shape of the active site, so the substrate can no longer bind effectively. Because the inhibitor doesn't compete for the active site, increasing substrate concentration does NOT overcome the inhibition.");

/* ===== REQUIRED PRACTICAL ===== */
const RP = "Required Practical";
add(RP,"★★★★★ Q9. Investigating the effect of temperature on amylase — what is the independent variable?","Temperature (of the water bath).");
add(RP,"★★★★★ Q9. Investigating the effect of temperature on amylase — what is the dependent variable?","Time taken for the iodine test to turn from blue-black to orange/no colour change (i.e. time for starch to be fully broken down).");
add(RP,"★★★★★ Q9. What must be controlled in the amylase/temperature practical?","pH (buffer solution), amylase concentration, starch concentration, volume of solutions, and time intervals between iodine tests.");
add(RP,"★★★★★ Q9. What is the iodine test used for in this practical, and what result indicates starch is present?","Tests for the presence of starch. Iodine solution turns from browny-orange to blue-black if starch is present; no colour change once starch has been fully hydrolysed.");
add(RP,"★★★★★ Q9. Why use a water bath rather than a beaker on a heat source directly?","A thermostatically controlled water bath keeps the temperature constant and accurate throughout the investigation, rather than fluctuating.");
add(RP,"★★★★★ Q9. Why take repeats and calculate a mean in this practical?","Repeats improve reliability by allowing anomalous results to be identified and excluded; the mean gives a more accurate representation of the true reaction time at each temperature.");
add(RP,"★★★★★ Q10. Suggest improvements to the amylase practical.","Repeat trials and calculate mean values; identify and exclude anomalous results; use a thermostatically controlled water bath for more precise temperatures; use a colorimeter rather than judging colour change by eye (removes subjectivity); use digital timing equipment for more precise reaction times.");

/* ===== EXAMINER'S TOP 10 MISTAKES ===== */
const MX = "Top 10 Mistakes";
add(MX,"❌ 'Heat kills enzymes.' What's the correct A★ phrasing?","✔ High temperatures denature enzymes.");
add(MX,"❌ 'The active site disappears.' What's the correct A★ phrasing?","✔ The active site changes shape.");
add(MX,"❌ 'The enzyme is used up.' What's the correct A★ phrasing?","✔ The enzyme remains unchanged after the reaction and can be reused.");
add(MX,"❌ 'Enzymes provide energy.' What's the correct A★ phrasing?","✔ Enzymes lower activation energy — they don't provide energy themselves.");
add(MX,"❌ 'pH destroys the substrate.' What's the correct A★ phrasing?","✔ pH changes the enzyme's tertiary structure, not the substrate.");
add(MX,"❌ 'More substrate always increases rate.' What's the correct A★ phrasing?","✔ Only until enzymes become saturated — then enzyme concentration becomes limiting.");
add(MX,"❌ 'A competitive inhibitor permanently blocks the enzyme.' What's the correct A★ phrasing?","✔ It binds reversibly — increasing substrate concentration can overcome it.");
add(MX,"❌ 'Non-competitive inhibitors bind to the active site.' What's the correct A★ phrasing?","✔ They bind to an allosteric site, changing the active site's shape indirectly.");
add(MX,"❌ 'Denaturation is always reversible.' What's the correct A★ phrasing?","✔ It is usually irreversible under exam conditions.");
add(MX,"❌ 'Every enzyme works best at pH 7.' What's the correct A★ phrasing?","✔ Optimum pH depends on the specific enzyme (e.g. pepsin ~pH 2, trypsin ~pH 8).");

/* ===== A★ MEMORY CHECKLIST ===== */
const MC = "A★ Memory Checklist";
add(MC,"Before the exam, can you define: Active site?","The region of an enzyme, complementary in shape to the substrate, where the substrate binds.");
add(MC,"Before the exam, can you define: Enzyme-substrate complex?","The temporary structure formed when a substrate binds to an enzyme's active site.");
add(MC,"Before the exam, can you define: Activation energy?","The minimum energy needed for a reaction to occur; enzymes lower this.");
add(MC,"Before the exam, can you define: Optimum temperature / optimum pH?","The temperature or pH at which an enzyme's activity/reaction rate is at its maximum.");
add(MC,"Before the exam, can you define: Denaturation?","A permanent change to an enzyme's tertiary structure (and therefore active site shape) caused by extremes of temperature or pH, usually irreversible.");
add(MC,"Before the exam, can you define: Competitive inhibition?","Reversible binding of an inhibitor (resembling the substrate) to the active site, blocking substrate binding.");
add(MC,"Before the exam, can you define: Non-competitive inhibition?","Binding of an inhibitor to an allosteric site, changing the active site's shape so the substrate can't bind; not overcome by more substrate.");
add(MC,"Before the exam, can you define: Limiting factor?","The factor that, at a given moment, restricts the rate of a reaction because it is in shortest supply relative to demand.");
add(MC,"Before the exam, can you define: Reliability (in practicals)?","The extent to which repeating an investigation gives consistent results.");
add(MC,"Before the exam, can you define: Validity (in practicals)?","Whether an investigation actually tests what it claims to, with all relevant variables controlled.");
add(MC,"Before the exam, can you define: Controlled variables?","Factors kept constant throughout an investigation so they don't affect the dependent variable.");

/* ===== EXAMINER'S FINAL ADVICE ===== */
const FA = "Examiner's Final Advice";
add(FA,"Why do enzymes appear in almost every exam paper?","A single enzyme question can simultaneously assess AO1 (knowledge), AO2 (application/data interpretation) and AO3 (practical skills, graph analysis, evaluation, calculations) — giving examiners maximum coverage from one topic.");
add(FA,"What is the 4-step A★ structure for answering a 4-6 mark enzyme question?","1. State the biological principle. 2. Explain the molecular mechanism. 3. Link it to the effect on enzyme-substrate complex formation. 4. Conclude with the effect on reaction rate.");
add(FA,"What comes next in the A★ Examiner Prediction Pack series?","Prediction 3: Cell Membranes, Diffusion, Osmosis and Active Transport — another very high-frequency Paper 1 topic, covering the 20 highest-probability questions, model answers, mark schemes, practical questions, graph interpretation, data analysis, misconceptions and calculations.");

/* ---------------- APP LOGIC ---------------- */
const TOPICS = [GA, GB, GC, GD, GE, GF, RP, MX, MC, FA];
let currentTopic = "All";
let order = [];
let pos = 0;
let known = new Set();
let flipped = false;

const STORAGE_KEY = "bio_enzymes_progress_v1";

function loadProgress(){
  try{
    const raw = localStorageSafe.getItem(STORAGE_KEY);
    if(raw){ known = new Set(JSON.parse(raw)); }
  }catch(e){}
}
function saveProgress(){
  try{ localStorageSafe.setItem(STORAGE_KEY, JSON.stringify([...known])); }catch(e){}
}
/* In-memory fallback (artifacts / private browsing safe) */
const memStore = {};
const localStorageSafe = {
  getItem(k){ try{ return window.localStorage.getItem(k); }catch(e){ return memStore[k] || null; } },
  setItem(k,v){ try{ window.localStorage.setItem(k,v); }catch(e){ memStore[k]=v; } }
};

function buildTopicBar(){
  const bar = document.getElementById('topicBar');
  const all = ["All", ...TOPICS];
  bar.innerHTML = "";
  all.forEach(t=>{
    const chip = document.createElement('div');
    chip.className = 'chip' + (t===currentTopic ? ' active':'');
    chip.textContent = t==="All" ? "All Topics" : t;
    chip.onclick = ()=>{ currentTopic = t; setupDeck(); buildTopicBar(); };
    bar.appendChild(chip);
  });
}

function setupDeck(){
  const filtered = currentTopic==="All" ? DECK : DECK.filter(c=>c.topic===currentTopic);
  order = filtered.map(c=>c.id);
  pos = 0;
  flipped = false;
  render();
}

function shuffleDeck(){
  for(let i=order.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [order[i],order[j]] = [order[j],order[i]];
  }
  pos = 0;
  flipped = false;
  render();
}

function currentCard(){
  const id = order[pos];
  return DECK.find(c=>c.id===id);
}

function render(){
  const card = currentCard();
  const cardEl = document.getElementById('card');
  cardEl.classList.remove('flipped');
  flipped = false;
  if(!card){
    document.getElementById('qText').textContent = "No cards in this topic.";
    document.getElementById('aText').innerHTML = "";
    return;
  }
  document.getElementById('qText').innerHTML = card.q;
  document.getElementById('aText').innerHTML = card.a;
  const shortTag = card.topic;
  document.getElementById('tagFront').textContent = shortTag;
  document.getElementById('tagBack').textContent = shortTag;
  document.getElementById('idxFront').textContent = (pos+1)+"/"+order.length;
  document.getElementById('idxBack').textContent = (pos+1)+"/"+order.length;
  document.getElementById('progressLabel').textContent = (pos+1)+" / "+order.length;
  document.getElementById('progressFill').style.width = order.length ? (((pos+1)/order.length)*100)+"%" : "0%";
  document.getElementById('knownLabel').textContent = "✓ "+[...known].filter(id=>order.includes(id)).length;
  document.getElementById('deckLabel').textContent = (currentTopic==="All"?"All Topics":currentTopic) + " · " + order.length + " cards";
}

function flip(){
  const cardEl = document.getElementById('card');
  flipped = !flipped;
  cardEl.classList.toggle('flipped', flipped);
}

function next(){
  if(order.length===0) return;
  pos = (pos+1) % order.length;
  render();
}
function prev(){
  if(order.length===0) return;
  pos = (pos-1+order.length) % order.length;
  render();
}

function rate(status){
  const card = currentCard();
  if(!card) return;
  if(status==="good"){ known.add(card.id); }
  else { known.delete(card.id); }
  saveProgress();
  next();
}

/* Events */
document.getElementById('card').addEventListener('click', flip);
document.getElementById('nextBtn').addEventListener('click', next);
document.getElementById('prevBtn').addEventListener('click', prev);
document.getElementById('shuffleBtn').addEventListener('click', shuffleDeck);
document.getElementById('rateAgain').addEventListener('click', ()=>rate('again'));
document.getElementById('rateHard').addEventListener('click', ()=>rate('hard'));
document.getElementById('rateGood').addEventListener('click', ()=>rate('good'));
document.getElementById('resetLink').addEventListener('click', ()=>{
  known = new Set();
  saveProgress();
  render();
});

/* Swipe support */
let touchStartX = null, touchStartY = null;
const stage = document.querySelector('.stage');
stage.addEventListener('touchstart', e=>{
  touchStartX = e.changedTouches[0].clientX;
  touchStartY = e.changedTouches[0].clientY;
}, {passive:true});
stage.addEventListener('touchend', e=>{
  if(touchStartX===null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)){
    if(dx < 0) next(); else prev();
  }
  touchStartX = null; touchStartY = null;
}, {passive:true});

/* Keyboard support (desktop) */
document.addEventListener('keydown', e=>{
  if(e.key==="ArrowRight") next();
  else if(e.key==="ArrowLeft") prev();
  else if(e.key===" "){ e.preventDefault(); flip(); }
  else if(e.key==="1") rate('again');
  else if(e.key==="2") rate('hard');
  else if(e.key==="3") rate('good');
});

/* Init */
loadProgress();
buildTopicBar();
setupDeck();
</script>
</body>
</html>
