[9,"What is an anomalous result?","A result that does not fit the pattern of the other data, usually caused by an error in the investigation.","Anomalous results should be identified and excluded from mean."],
[9,"How is magnification calculated?","Magnification = Image size ÷ Actual size.","Always convert units to the same scale before calculating."],
[9,"How do you convert micrometres to millimetres?","Divide by 1000 (1 mm = 1000 μm).","μm ÷ 1000 = mm."],
[9,"What is the formula for calculating rate?","Rate = 1 ÷ time (for reactions)\nOr: rate = quantity produced or consumed ÷ time.","Rate = 1/t when measuring time for a fixed change."],
[9,"What is the formula for percentage change?","Percentage change = [(new value − original value) ÷ original value] × 100.","Always compare to the original value (not new value)."],
[9,"What is standard deviation?","A measure of the spread of data around the mean; a large SD indicates a wide spread of data.","SD = measure of variation; small SD = data clustered around mean."],
[9,"What is standard error?","A measure of how accurately the sample mean estimates the true population mean; decreases as sample size increases.","SE = SD ÷ √n; smaller SE = more precise estimate."],
[9,"What are error bars on a graph?","Lines extending from data points showing the range of data (SD, SE or range); overlapping error bars suggest no significant difference.","Overlapping SE bars → not significant; non-overlapping → likely significant."],
[9,"What is a mean?","The average of a data set: sum of all values ÷ number of values.","Use mean with SD/SE to summarise data."],
[9,"What is a median?","The middle value in a data set when ordered from smallest to largest.","Median is less affected by extreme values (outliers) than the mean."],
[9,"What is a mode?","The most frequently occurring value in a data set.","Mode is most useful for categorical data."],
[9,"What is a sample?","A subset of the population studied in an investigation.","Larger sample = more representative = more reliable."],
[9,"Why use a large sample size?","To reduce the effect of chance variation, increase reliability and make results more representative of the population.","Large n → more reliable results."],
[9,"What is a transect?","A line along which organisms are sampled systematically to investigate the distribution of species across an area.","Belt transect: quadrats placed along line; continuous sampling."],
[9,"What is a quadrat?","A square frame placed randomly or systematically in a habitat to count or estimate the abundance or percentage cover of organisms.","Random placement avoids sampling bias."],
[9,"What is random sampling?","A sampling method in which every location has an equal chance of being selected, using random number tables or coordinates to avoid bias.","Random sampling prevents experimenter bias."],
[9,"What is systematic sampling?","A sampling method in which samples are taken at regular intervals along a transect or grid.","Used when investigating gradual environmental changes."],
[9,"What is stratified sampling?","A sampling method in which the population is divided into subgroups and samples are taken from each subgroup in proportion to its size.","Stratified sampling = proportional representation of subgroups."],
[9,"What is an aseptic technique?","A set of procedures used to prevent contamination of cultures with unwanted microorganisms (e.g. flaming loops, working near Bunsen burner).","Aseptic technique essential in microbiology practicals."],
[9,"What is the formula for population estimation (mark-release-recapture)?","Population size (N) = (M × S) ÷ R\nM = number marked; S = size of second sample; R = number recaptured that were marked.","Assumes marks don't affect survival; random mixing; closed population."],
[9,"What is a serial dilution?","A series of dilutions in which the concentration is reduced by the same factor each time (e.g. ×10 each time).","Used in calibration curves and microbiology."],
[9,"What is a calibration curve?","A graph produced using known standard concentrations to allow the unknown concentration of a sample to be determined.","Used in colorimetry and enzyme assays."],
[9,"What is colorimetry?","A technique that measures the absorbance or transmission of light through a coloured solution to determine the concentration of a substance.","Colorimeter measures light absorbance; used in enzyme/glucose assays."],
[9,"What is chromatography used for?","To separate mixtures of substances (e.g. pigments) based on differences in solubility and attraction to the stationary phase.","Rf = distance moved by spot ÷ distance moved by solvent."],
[9,"What is the Rf value?","Rf = distance moved by substance ÷ distance moved by solvent front.\nUsed to identify substances in chromatography.","Rf value is specific to substance, solvent and conditions."],
[9,"What is gel electrophoresis used for?","To separate DNA, RNA or protein molecules by size using an electric field; smaller molecules move further.","Gel electrophoresis: small = moves far; large = stays near well."],
[9,"What is a haemocytometer?","A specialised microscope slide used to count cells in a known volume of fluid, used for counting blood cells or yeast.","Haemocytometer: count cells in grid squares × dilution factor."],
[9,"What is a respirometer?","A device used to measure the rate of oxygen consumption (or CO₂ production) by an organism, to measure metabolic rate.","Respirometer: uses manometer to measure O₂ consumption."],
[9,"What is the formula for efficiency of energy transfer?","Efficiency (%) = (energy at higher trophic level ÷ energy at lower trophic level) × 100.","Typical efficiency = 10%."],
[9,"What is a potometer?","A device used to measure the rate of water uptake by a plant shoot (as an indirect measure of transpiration rate).","Potometer: measures water uptake, not actual transpiration."],
[9,"How does a bubble potometer work?","Air bubble in capillary tube moves as water is taken up by the shoot; distance moved per unit time = rate of water uptake.","Distance ÷ time = rate; cross-sectional area × distance = volume."],
[9,"What is a valid conclusion?","A conclusion that is supported by the data, refers to the hypothesis and considers the limitations of the investigation.","Conclusion must be justified by evidence."],
[9,"What are sources of error in biology experiments?","Random error, systematic error, human error (e.g. parallax), biological variation, contamination.","Identify and suggest improvements."],
[9,"What is a risk assessment?","An evaluation of potential hazards in an experiment and the precautions taken to minimise risk.","Risk assessment required for all practical work."],
[9,"What is a hazard?","Anything that has the potential to cause harm (e.g. hot water, chemicals, broken glassware).","Hazard ≠ risk; risk = probability of harm occurring."],
[9,"What is ethical consideration in biology?","Consideration of potential harm to organisms, privacy of participants and social impact of research.","Animal experiments must be justified; minimise suffering (3Rs: Replace, Reduce, Refine)."],
[9,"What is the 3Rs principle in animal testing?","Replace: use alternatives to animals where possible.\nReduce: use fewer animals.\nRefine: minimise suffering and improve welfare.","3Rs = ethical standard for animal research."],
[9,"What is the formula for standard deviation (simplified)?","SD = √[Σ(x − x̄)² ÷ (n − 1)]\nWhere x̄ = mean, n = number of values.","Use n−1 for sample standard deviation."],
[9,"What is the difference between a hypothesis and a prediction?","Hypothesis: a testable explanation for an observation.\nPrediction: a specific, measurable outcome expected if the hypothesis is correct.","Hypothesis = why; Prediction = what will happen."],
[9,"What is interpolation?","Reading a value from within the range of data on a graph.","Interpolation = within data range; reliable."],
[9,"What is extrapolation?","Extending a graph beyond the range of data to estimate values outside the measured range.","Extrapolation = beyond data range; less reliable."],
[9,"What is a line of best fit?","A line drawn through data points on a graph that represents the general trend; does not have to pass through all points.","Line of best fit: equal numbers of points above and below."],
[9,"What is the difference between qualitative and quantitative data?","Qualitative: descriptive, non-numerical (e.g. colour, texture).\nQuantitative: numerical measurements.","Quantitative data can be analysed statistically."],
[9,"What is a continuous variable?","A variable that can take any numerical value within a range (e.g. mass, temperature, length).","Continuous variable: displayed as line graph."],
[9,"What is a categorical variable?","A variable that falls into distinct groups with no numerical relationship (e.g. species, blood group).","Categorical variable: displayed as bar chart."],
[9,"What is the formula for calculating percentage cover in a quadrat?","Number of squares containing the species ÷ total number of squares × 100.","Used in plant ecology surveys."],
[9,"What is a discontinuous variable?","A variable that can only take specific discrete values (e.g. number of spots, number of offspring).","Discontinuous: bar chart (gaps between bars)."]
];

var cur=0,idx=0,shown=false,deck=[],easy=0,hard=0,done=0;
function mkDeck(){deck=[];for(var i=0;i<cards.length;i++){if(cards[i][0]===cur)deck.push(i);}}
function tabs(){
  var h="";
  for(var i=0;i<TP.length;i++){
    var cnt=0;for(var j=0;j<cards.length;j++){if(cards[j][0]===i)cnt++;}
    h+='<span class="tab'+(i===cur?" on":"")+'" onclick="sw('+i+')">'+TP[i]+' ('+cnt+')</span>';
  }
  document.getElementById("TB").innerHTML=h;
}
function render(){
  if(!deck.length)return;
  var c=cards[deck[idx]];
  document.getElementById("TG").textContent=TP[c[0]];
  document.getElementById("TG2").textContent=TP[c[0]];
  document.getElementById("QQ").textContent=c[1];
  document.getElementById("AA").textContent=c[2];
  document.getElementById("TP").innerHTML="<b>🎯 Exam Tip:</b> "+c[3];
  document.getElementById("CN").textContent=(idx+1)+" / "+deck.length;
  document.getElementById("CD").className=shown?"card shown":"card";
  document.getElementById("RB").className=shown?"rbs show":"rbs";
  document.getElementById("IF").textContent="Card "+(idx+1)+" of "+deck.length;
  var pct=Math.round((done/cards.length)*100);
  document.getElementById("PB").style.width=pct+"%";
  document.getElementById("sT").textContent=cards.length;
  document.getElementById("sD").textContent=done;
  document.getElementById("sE").textContent=easy;
  document.getElementById("sH").textContent=hard;
}
function rev(){if(!shown){shown=true;render();}}
function go(d){
  shown=false;idx+=d;
  if(idx<0)idx=deck.length-1;
  if(idx>=deck.length)idx=0;
  render();
}
function rt(r){
  done++;
  if(r==='e'||r==='o')easy++;
  else hard++;
  shown=false;idx++;
  if(idx>=deck.length){
    idx=0;
    document.getElementById("MC").style.display="none";
    document.getElementById("DN").style.display="block";
  } else { render(); }
}
function sw(n){cur=n;idx=0;shown=false;mkDeck();tabs();document.getElementById("MC").style.display="block";document.getElementById("DN").style.display="none";render();}
function rst(){idx=0;shown=false;document.getElementById("MC").style.display="block";document.getElementById("DN").style.display="none";render();}
function shuf(){deck.sort(function(){return Math.random()-0.5;});idx=0;shown=false;render();}
mkDeck();tabs();render();
</script>
