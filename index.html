<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio Flashcards - Topic 4</title>
<style>
body{margin:0;padding:10px;background:#111;color:#eee;font-family:Arial,sans-serif}
h2{color:#4CAF50;font-size:16px;margin:0 0 8px}
.tabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tab{padding:5px 10px;background:#222;border:1px solid #444;border-radius:5px;color:#aaa;cursor:pointer;font-size:12px}
.tab.on{background:#4CAF50;color:#000}
.info{font-size:12px;color:#888;margin-bottom:6px}
.card{background:#1a1a2e;border:1px solid #333;border-radius:10px;padding:15px;min-height:140px;margin-bottom:8px;cursor:pointer}
.card.green{background:#0a2a0a;border-color:#2a5a2a}
.tag{font-size:10px;color:#58a6ff;text-transform:uppercase;margin-bottom:6px}
.q{font-size:16px;line-height:1.5;text-align:center;padding:8px 0}
.hint{text-align:center;color:#666;font-size:12px;margin-top:8px}
.a{font-size:14px;line-height:1.7;white-space:pre-wrap;display:none}
.a.show{display:block}
.btns{display:flex;gap:6px;margin-bottom:6px}
.btn{flex:1;padding:10px;border-radius:8px;border:1px solid #444;background:#222;color:#eee;font-size:13px;font-weight:bold;cursor:pointer}
.rbs{display:flex;gap:5px;display:none}
.rbs.show{display:flex}
.rb{flex:1;padding:8px 2px;border-radius:6px;font-size:11px;font-weight:bold;cursor:pointer;border:1px solid}
.score{font-size:12px;color:#888;margin-top:8px;text-align:center}
</style>
</head>
<body>
<h2>🧬 Topic 4 — Biology Flashcards</h2>
<div class="tabs" id="TB"></div>
<div class="info" id="IF"></div>
<div class="card" id="CD" onclick="rev()">
  <div class="tag" id="TG"></div>
  <div class="q" id="QQ"></div>
  <div class="hint" id="HT">👆 Tap to reveal answer</div>
  <div class="a" id="AA"></div>
</div>
<div class="btns">
  <button class="btn" onclick="go(-1)">← Prev</button>
  <button class="btn" onclick="rev()">👁 Reveal</button>
  <button class="btn" onclick="go(1)">Next →</button>
</div>
<div class="rbs" id="RB">
  <button class="rb" style="background:#0a2a0a;color:#4CAF50;border-color:#2a5a2a" onclick="rt(1)">✅ Easy</button>
  <button class="rb" style="background:#0a1a3a;color:#58a6ff;border-color:#1a3a6a" onclick="rt(2)">👍 OK</button>
  <button class="rb" style="background:#2a1a0a;color:#ffa657;border-color:#5a3a1a" onclick="rt(3)">⚠️ Hard</button>
  <button class="rb" style="background:#2a0a0a;color:#ff6b6b;border-color:#5a1a1a" onclick="rt(4)">❌ Missed</button>
</div>
<div class="score" id="SC"></div>
<script>
var TP=["SA:Vol","Gas Exch","Circulation","Blood","Tissue Fluid","Plants"];
var cards=[
[0,"SA:Vol ratio and organism size?","The LARGER the organism, the LOWER its SA:Vol ratio.\n\nLarge cube: SA:Vol = 0.6\nSmall cube: SA:Vol = 3.0"],
[0,"How does SA:Vol affect transport?","Lower SA:Vol = molecules travel further to reach all cells.\nDiffusion alone is not enough for large organisms."],
[0,"Why do large organisms need mass transport?","Small SA:Vol means diffusion cannot supply all cells.\nNeed mass transport systems and specialised exchange surfaces."],
[0,"Why do cells have a membrane?","1. To REGULATE movement of substances in and out.\n2. To PROTECT the organelles inside."],
[0,"What is the fluid mosaic model?","Phospholipid bilayer (fluid) with proteins scattered throughout (mosaic).\nIncludes: transport, receptor and enzyme proteins."],
[0,"Define passive transport. Give 3 examples.","Movement DOWN a concentration gradient. NO energy needed.\nExamples: diffusion, facilitated diffusion, osmosis."],
[0,"Define diffusion and its rate factors.","Net movement from high to low concentration.\nRate depends on: surface area, temperature, concentration gradient, membrane thickness."],
[0,"Define facilitated diffusion.","High to low concentration through carrier or channel proteins.\nUsed by charged or polar molecules (e.g. glucose, ions)."],
[0,"Define osmosis.","Net movement of FREE WATER MOLECULES from high to low water potential across a partially permeable membrane."],
[0,"Define water potential.","Tendency of water to move by osmosis.\nPure water = 0 kPa (highest).\nWater moves from higher to lower water potential."],
[0,"How is water potential calculated?","Psi = Psi-s + Psi-p\nPsi-s = solute/osmotic potential\nPsi-p = pressure/turgor potential (push from cell wall)"],
[0,"How do molecular properties affect transport?","Lipid solubility: lipid-soluble molecules cross easily.\nSize: smaller diffuses faster.\nCharge: charged molecules need carrier/channel proteins."],
[0,"How do large molecules cross the membrane?","Via VESICLES.\nEndocytosis: cell engulfs material into vesicle.\nExocytosis: vesicle fuses with membrane, releases contents outside."],
[0,"Define active transport.","Movement AGAINST a concentration gradient (low to high).\nRequires ATP energy and carrier proteins."],
[0,"Role of ATP in active transport?","ATP binds to carrier protein. Energy changes protein shape.\nMolecule carried across membrane against its gradient."],
[0,"How does ATP release energy?","ADP + Pi forms ATP (stores energy).\nATP hydrolysis releases energy for cellular work.\nADP re-phosphorylated by respiration."],
[1,"3 features of efficient gas exchange surface?","1. Large surface area\n2. Short/thin diffusion distance\n3. Steep concentration gradient (maintained by blood or ventilation)"],
[1,"Describe insect gas exchange system.","Spiracles: openings on body surface.\nTraacheae: large tubes through body; rings prevent collapse.\nTraacheoles: tiny branches delivering O2 directly to cells."],
[1,"How are insects adapted for gas exchange?","Spiracles open/close to control water loss.\nMuscles allow mass air movement.\nTraacheoles highly branched = large surface area."],
[1,"Describe fish gas exchange system.","Gills: filaments on arches.\nLamellae: folds on filaments, water passes over them.\nCountercurrent exchange: blood and water flow in opposite directions."],
[1,"How are fish adapted for gas exchange?","Many filaments and lamellae = large surface area.\nCountercurrent flow: water always meets blood with lower O2, maintaining steep gradient throughout."],
[1,"How are mammals adapted for gas exchange?","Alveoli:\n- Large surface area (~70 m2)\n- One-cell-thick walls (short diffusion path)\n- Rich blood supply maintains steep O2 gradient"],
[1,"How are plant leaves adapted for gas exchange?","1. Spongy mesophyll: large surface area.\n2. Waxy cuticle: impermeable, reduces water loss.\n3. Lenticels: allow gas entry and exit."],
[1,"How do plants limit water loss during gas exchange?","Guard cells regulate stomata.\nStomata close to prevent water loss but some stay open for gas exchange."],
[2,"Relate heart chamber structure to function.","Atria: thin elastic walls, stretch when filling.\nVentricles: thick muscular walls, pump at high pressure.\nLeft ventricle THICKER - pumps blood around entire body."],
[2,"Relate artery structure to function.","Thick muscular walls: withstand high pressure.\nElastic tissue: recoils for smooth flow.\nNarrow lumen: maintains high pressure."],
[2,"Relate vein structure to function.","Thin walls: low blood pressure.\nValves: prevent backflow.\nLess muscular/elastic tissue: less need to control flow."],
[2,"Relate capillary structure to function.","One-cell-thick walls: short diffusion pathway.\nNarrow lumen: RBCs lie flat for efficient O2 delivery.\nNumerous and branched: large surface area."],
[2,"Why are two heart pumps needed?","Pressure drops through lung capillaries.\nBlood returns to heart for pressure boost.\nThis is DOUBLE CIRCULATION."],
[2,"Describe cardiac diastole.","Heart RELAXED.\nBlood fills atria, opens AV valves, flows into ventricles.\nSemilunar valves stay closed (pressure lower than arteries)."],
[2,"Describe atrial systole.","ATRIA CONTRACT.\nRemaining blood pushed into ventricles."],
[2,"Describe ventricular systole.","VENTRICLES CONTRACT. Pressure rises.\nAV valves close (prevent backflow).\nSemilunar valves open. Blood enters arteries."],
[2,"What does myogenic mean?","Heart initiates its own contraction FROM WITHIN the cardiac muscle.\nNot controlled by external nerve impulses."],
[2,"Name the nodes and locations.","SAN (Sinoatrial Node): wall of RIGHT ATRIUM - the pacemaker.\nAVN (Atrioventricular Node): between the two atria."],
[2,"How does the heart contract?","1. SAN sends impulse across atria - atria contract.\n2. AVN receives, DELAYS, sends down Bundle of His.\n3. Purkinje fibres spread impulse - ventricles contract bottom-up."],
[2,"Why does the AVN delay the impulse?","Allows ATRIAL SYSTOLE TO COMPLETE before ventricular contraction.\nEnsures ventricles fill fully with blood first."],
[2,"What is an ECG?","Graph of electrical activity in the heart.\nP wave: atrial depolarisation (SAN)\nQRS complex: ventricular depolarisation\nT wave: ventricular repolarisation"],
[3,"Function of blood?","Transports O2, nutrients, hormones, CO2 and waste.\nForms tissue fluid.\nImmune defence against pathogens."],
[3,"Main components of blood?","1. Erythrocytes: carry O2\n2. Leucocytes: immune defence\n3. Platelets: clotting\n4. Plasma: liquid matrix (55% of blood)"],
[3,"Structure and function of erythrocytes?","Biconcave disc: large SA for gas exchange.\nNo nucleus: more space for haemoglobin.\nPacked with Hb: carries O2.\nSmall and flexible: fits through capillaries."],
[3,"Types of leucocytes and functions?","Lymphocytes: release antibodies, engulf pathogens.\nEosinophils: detoxify foreign proteins.\nNeutrophils: phagocytosis.\nMonocytes: respond to inflammation."],
[3,"Explain blood clotting.","1. Platelets release THROMBOPLASTIN.\n2. Prothrombin becomes THROMBIN.\n3. Fibrinogen becomes FIBRIN mesh, traps cells, forms clot."],
[3,"What causes atherosclerosis?","Endothelium damage. Cholesterol and cells accumulate.\nHardens into FIBROUS PLAQUE that narrows artery.\nRisk of: heart attack, stroke, angina."],
[3,"Risk factors for atherosclerosis?","Age, genetics, smoking, alcohol, lack of exercise, obesity, high cholesterol."],
[3,"Structure of haemoglobin?","Globular water-soluble protein.\nFour polypeptide chains each with a haem group containing Fe2+ that binds O2.\nQuaternary structure."],
[3,"How does pO2 affect haemoglobin?","High pO2 in lungs: Hb LOADS O2 (high affinity).\nLow pO2 in tissues: Hb RELEASES O2 (low affinity)."],
[3,"Explain the Bohr effect.","High pCO2 creates acidic conditions.\nHb changes shape - LOWER AFFINITY for O2.\nO2 released to active tissues.\nCurve shifts RIGHT."],
[3,"What do dissociation curves show?","% Hb saturation with O2 (y-axis) vs partial pressure of O2 in kPa (x-axis).\nCurve LEFT = higher affinity. Curve RIGHT = lower affinity."],
[3,"What is myoglobin?","O2-storage protein in muscle cells.\nHigher affinity for O2 than Hb.\nCurve sits further LEFT.\nReleases O2 only at very low pO2."],
[3,"How does foetal Hb differ from adult Hb?","Foetal Hb has HIGHER AFFINITY for O2.\nAt the placenta foetal Hb loads O2 released by maternal Hb.\nMeets both mother and foetus needs."],
[4,"What is tissue fluid?","Watery solution of glucose, amino acids and O2.\nBathes cells, supplying nutrients and removing waste (CO2, urea)."],
[4,"Pressures influencing tissue fluid formation?","Hydrostatic pressure (HP): forces fluid OUT at arterial end.\nOncotic pressure (OP): draws fluid BACK IN at venous end."],
[4,"How is tissue fluid formed?","Blood in narrow capillaries: hydrostatic pressure forces fluid out into intercellular spaces.\nFluid returns when HP drops at venous end."],
[4,"What happens to excess tissue fluid?","Absorbed into LYMPH CAPILLARIES.\nTravels through lymphatic system.\nReturned to blood near the heart."],
[5,"Relate xylem structure to function.","Long dead hollow columns: uninterrupted water flow.\nPits: lateral water movement.\nLignified walls: structural support, prevents collapse."],
[5,"Relate phloem structure to function.","Sieve tube elements: transport sucrose.\nCompanion cells: active transport of sugars into tubes.\nPlasmodesmata: connect cytoplasms, allow flow."],
[5,"Explain the apoplastic pathway.","Water moves through CELL WALLS and intercellular spaces.\nBlocked at CASPARIAN STRIP in endodermis.\nForces water into symplast."],
[5,"Explain the symplastic pathway.","Water moves through CYTOPLASM via plasmodesmata.\nRequires water to be actively transported into cells first."],
[5,"Explain the cohesion-tension theory.","Water forms hydrogen bonds (COHESION).\nTranspiration creates TENSION that pulls the water column up through the xylem."],
[5,"How does root pressure affect water movement?","High mineral concentration in root = LOW WATER POTENTIAL.\nOsmotic flow into root.\nWeak PUSH EFFECT moves water up stem."],
[5,"How does temperature affect transpiration?","Higher temperature = more kinetic energy = faster evaporation = INCREASED transpiration rate."],
[5,"How does light affect transpiration?","More light = more photosynthesis = more stomata open = INCREASED transpiration rate."],
[5,"How does humidity affect transpiration?","High humidity = reduced concentration gradient = DECREASED transpiration rate."],
[5,"How does wind affect transpiration?","Wind blows moist air away = steeper gradient = INCREASED transpiration rate."],
[5,"Summarise the mass-flow hypothesis.","1. Sucrose loaded by active transport - lowers water potential.\n2. Water enters by osmosis - raises pressure.\n3. Pressure drives sugars from SOURCE (leaf) to SINK (root/fruit)."],
[5,"Evidence FOR mass flow hypothesis.","Sap released when stem cut confirms pressure in phloem.\nHigher sucrose in leaves than roots confirms gradient exists."],
[5,"Evidence AGAINST mass flow hypothesis.","Not all solutes move at same speed (mass flow predicts they should).\nBidirectional movement in sieve tubes (mass flow is unidirectional)."]
];
var cur=0,idx=0,shown=false,deck=[],easy=0,hard=0,total=0;
function mkDeck(){deck=[];for(var i=0;i<cards.length;i++){if(cards[i][0]===cur)deck.push(i);}}
function tabs(){
  var h="";
  for(var i=0;i<TP.length;i++){
    h+='<span class="tab'+(i===cur?" on":"")+'" onclick="sw('+i+')">'+TP[i]+'<\/span>';
  }
  document.getElementById("TB").innerHTML=h;
}
function render(){
  if(!deck.length)return;
  var c=cards[deck[idx]];
  document.getElementById("TG").textContent=TP[c[0]];
  document.getElementById("QQ").textContent=c[1];
  document.getElementById("AA").textContent=c[2];
  document.getElementById("AA").className=shown?"a show":"a";
  document.getElementById("HT").style.display=shown?"none":"block";
  document.getElementById("CD").className=shown?"card green":"card";
  document.getElementById("RB").className=shown?"rbs show":"rbs";
  document.getElementById("IF").textContent="Card "+(idx+1)+" of "+deck.length+" | Easy: "+easy+" Hard: "+hard;
}
function rev(){if(!shown){shown=true;render();}}
function go(d){
  shown=false;
  idx+=d;
  if(idx<0)idx=deck.length-1;
  if(idx>=deck.length)idx=0;
  render();
}
function rt(r){
  total++;
  if(r<=2)easy++;else hard++;
  document.getElementById("SC").textContent="Reviewed: "+total+" | Easy: "+easy+" | Hard: "+hard;
  go(1);
}
function sw(n){cur=n;idx=0;shown=false;mkDeck();tabs();render();}
mkDeck();tabs();render();
</script>
</body>
</html>
