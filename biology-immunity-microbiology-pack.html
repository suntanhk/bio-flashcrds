<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Biology Immunity, Microbiology & Infectious Disease Pack — 9BI0</title>
<style>
  :root{
    --bg:#0d1117;
    --card-bg:#161b22;
    --card-back:#1c2333;
    --border:#2a3346;
    --text:#e6edf3;
    --text-dim:#8b96a5;
    --accent:#4fd1c5;
    --accent2:#a78bfa;
    --good:#3fb950;
    --warn:#f0b429;
    --danger:#f85149;
    --shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overscroll-behavior:none;
  }
  body{
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh;
    min-height:-webkit-fill-available;
    padding: env(safe-area-inset-top,16px) 16px calc(env(safe-area-inset-bottom,16px) + 12px);
  }
  header{
    width:100%; max-width:520px; text-align:center; padding-top:10px;
  }
  h1{
    font-size:1.05rem; font-weight:700; margin:4px 0 2px; letter-spacing:0.2px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .subtitle{ font-size:0.75rem; color:var(--text-dim); margin-bottom:10px;}

  .topic-bar{
    width:100%; max-width:520px;
    display:flex; gap:6px; overflow-x:auto; padding:4px 2px 10px;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .topic-bar::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;
    padding:7px 12px;
    border-radius:20px;
    background:var(--card-bg);
    border:1px solid var(--border);
    color:var(--text-dim);
    font-size:0.72rem;
    font-weight:600;
    white-space:nowrap;
    cursor:pointer;
    transition:all .15s ease;
  }
  .chip.active{
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    color:#0d1117;
    border-color:transparent;
  }

  .progress-row{
    width:100%; max-width:520px;
    display:flex; align-items:center; justify-content:space-between;
    font-size:0.72rem; color:var(--text-dim); margin-bottom:8px; padding:0 2px;
  }
  .progress-track{
    flex:1; height:5px; background:var(--border); border-radius:4px; margin:0 10px; overflow:hidden;
  }
  .progress-fill{
    height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); width:0%;
    transition:width .25s ease;
  }

  .stage{
    width:100%; max-width:520px;
    flex:1;
    display:flex; align-items:center; justify-content:center;
    perspective:1400px;
    margin: 6px 0 14px;
    min-height:340px;
  }
  .card{
    width:100%;
    height:360px;
    position:relative;
    transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.2,.9,.3,1);
    cursor:pointer;
  }
  .card.flipped{ transform:rotateY(180deg); }
  .face{
    position:absolute; inset:0;
    backface-visibility:hidden;
    border-radius:20px;
    border:1px solid var(--border);
    box-shadow:var(--shadow);
    display:flex; flex-direction:column;
    padding:22px;
    overflow-y:auto;
  }
  .face::-webkit-scrollbar{width:4px;}
  .face::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}
  .front{
    background:radial-gradient(circle at 30% 20%, #1c2333, var(--card-bg) 70%);
    justify-content:center; align-items:center; text-align:center;
  }
  .back{
    background:radial-gradient(circle at 70% 20%, #232c44, var(--card-back) 70%);
    transform:rotateY(180deg);
    justify-content:flex-start; align-items:flex-start; text-align:left;
  }
  .tag{
    position:absolute; top:14px; left:14px;
    font-size:0.62rem; font-weight:700; letter-spacing:0.5px; text-transform:uppercase;
    color:var(--accent);
    background:rgba(79,209,197,0.1);
    border:1px solid rgba(79,209,197,0.3);
    padding:3px 8px; border-radius:20px;
  }
  .card-index{
    position:absolute; top:14px; right:14px;
    font-size:0.65rem; color:var(--text-dim);
  }
  .q-text{
    font-size:1.15rem; font-weight:600; line-height:1.4; margin-top:20px;
  }
  .tap-hint{
    position:absolute; bottom:14px; left:0; right:0; text-align:center;
    font-size:0.65rem; color:var(--text-dim);
  }
  .a-label{
    font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;
    color:var(--accent2); margin:20px 0 8px;
  }
  .a-text{
    font-size:1rem; line-height:1.5; font-weight:500;
  }
  .a-text ul{ margin:6px 0 0 18px; padding:0; }
  .a-text li{ margin-bottom:4px; }

  .controls{
    width:100%; max-width:520px;
    display:flex; align-items:center; gap:10px;
    margin-bottom:8px;
  }
  .btn{
    flex:1;
    background:var(--card-bg);
    border:1px solid var(--border);
    color:var(--text);
    padding:13px 10px;
    border-radius:14px;
    font-size:0.85rem;
    font-weight:600;
    display:flex; align-items:center; justify-content:center; gap:6px;
    cursor:pointer;
    -webkit-user-select:none; user-select:none;
    transition:transform .1s ease, background .15s ease;
  }
  .btn:active{ transform:scale(0.96); background:#1e2635; }
  .btn.wide{ flex:2; }
  .btn.icon-only{ flex:0 0 52px; font-size:1.1rem; }

  .rate-row{
    width:100%; max-width:520px;
    display:flex; gap:8px; margin-bottom:6px;
  }
  .rate-btn{
    flex:1;
    padding:11px 6px;
    border-radius:12px;
    border:1px solid var(--border);
    background:var(--card-bg);
    font-size:0.72rem;
    font-weight:700;
    text-align:center;
    cursor:pointer;
    -webkit-user-select:none; user-select:none;
  }
  .rate-btn.again{ color:var(--danger); }
  .rate-btn.hard{ color:var(--warn); }
  .rate-btn.good{ color:var(--good); }
  .rate-btn:active{ transform:scale(0.96); }

  .footer-row{
    width:100%; max-width:520px;
    display:flex; justify-content:space-between; align-items:center;
    font-size:0.68rem; color:var(--text-dim); margin-top:6px;
  }
  .footer-row span.link{
    color:var(--accent); cursor:pointer; font-weight:600;
  }

  .done-screen{
    width:100%; max-width:520px; text-align:center; padding:30px 10px;
  }
  .done-screen h2{ color:var(--good); font-size:1.3rem; margin-bottom:6px;}
  .done-screen p{ color:var(--text-dim); font-size:0.85rem; }

  @media (max-height:700px){
    .card{ height:310px; }
    .stage{ min-height:300px; }
  }
</style>
</head>
<body>

<header>
  <h1>Immunity &amp; Microbiology Pack</h1>
  <div class="subtitle">★★★★★ Immunity · Vaccination · Antibiotic Resistance · 9BI0</div>
</header>

<div class="topic-bar" id="topicBar"></div>

<div class="progress-row">
  <span id="progressLabel">1 / 1</span>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <span id="knownLabel">✓ 0</span>
</div>

<div class="stage">
  <div class="card" id="card">
    <div class="face front">
      <span class="tag" id="tagFront">Topic 1</span>
      <span class="card-index" id="idxFront">1/1</span>
      <div class="q-text" id="qText">Loading…</div>
      <div class="tap-hint">tap to flip</div>
    </div>
    <div class="face back">
      <span class="tag" id="tagBack">Topic 1</span>
      <span class="card-index" id="idxBack">1/1</span>
      <div class="a-label">Answer</div>
      <div class="a-text" id="aText"></div>
    </div>
  </div>
</div>

<div class="rate-row" id="rateRow">
  <div class="rate-btn again" id="rateAgain">✗ Again</div>
  <div class="rate-btn hard" id="rateHard">~ Shaky</div>
  <div class="rate-btn good" id="rateGood">✓ Got it</div>
</div>

<div class="controls">
  <div class="btn icon-only" id="prevBtn">‹</div>
  <div class="btn wide" id="shuffleBtn">🔀 Shuffle</div>
  <div class="btn icon-only" id="nextBtn">›</div>
</div>

<div class="footer-row">
  <span id="deckLabel">All Topics · 0 cards</span>
  <span class="link" id="resetLink">reset progress</span>
</div>

<script>
/* ---------------- DATA ---------------- */
const DECK = [];
let uid = 0;
function add(topic, q, a){ DECK.push({id: uid++, topic, q, a}); }

/* ===== LEARNING OUTCOMES ===== */
const LO = "Learning Outcomes";
add(LO,"List the eight highest-priority learning outcomes for this topic.","Distinguish between bacteria, viruses and fungi; explain how pathogens cause disease; describe the body's non-specific and specific defences; explain antibody production and immune memory; compare active and passive immunity; explain vaccination; describe antibiotic action and antimicrobial resistance; evaluate microbiological practical investigations.");

/* ===== PATHOGENS & INNATE DEFENCE Q1-3 ===== */
const PD = "Pathogens & Innate Defence";
add(PD,"★★★★★ Q1 (6 marks). Compare bacteria and viruses — 5 features.","Cell type: prokaryotic cells / acellular particles. Size: larger (~1-5 μm) / smaller (~20-300 nm). Ribosomes: present / absent. Metabolism: independent / no independent metabolism. Reproduction: binary fission / replicate only inside host cells.");
add(PD,"Q1 — Examiner Tip.","Always include at least one similarity (e.g. both can cause disease) if the command word is 'compare' — don't just list differences.");
add(PD,"★★★★★ Q2. Explain how viruses reproduce.","Viruses attach to specific receptor proteins on a host cell. Their genetic material enters the host cell and uses the host's ribosomes, enzymes and other cellular machinery to synthesise viral proteins and replicate viral nucleic acid. New virus particles assemble and are released to infect additional cells.");
add(PD,"★★★★★ Q3. Explain the role of phagocytes in immunity.","Phagocytes recognise pathogens, engulf them by phagocytosis and enclose them within a phagosome. Lysosomes fuse with the phagosome and release digestive enzymes that destroy the pathogen. This forms part of the non-specific (innate) immune response.");

/* ===== SPECIFIC IMMUNITY Q4-6 ===== */
const SI = "Specific Immunity";
add(SI,"★★★★★ Q4. Explain how antibodies are produced.","A pathogen carries antigens recognised by specific lymphocytes. Activated B lymphocytes divide by mitosis (clonal expansion) and differentiate into plasma cells. Plasma cells secrete large quantities of antibodies with binding sites complementary to the antigen. Some B cells become memory cells.");
add(SI,"★★★★★ Q5. Explain the role of memory cells.","Memory cells remain in the body after the primary immune response. If the same pathogen enters again, they rapidly divide and produce plasma cells. Antibodies are produced more quickly and in greater quantities, often preventing symptoms from developing.");
add(SI,"★★★★★ Q6 (6 marks). Compare active and passive immunity — 4 features.","Antibodies produced by: the individual's own immune system / another source. Memory cells: formed / not formed. Duration: long-lasting / short-term. Example: vaccination or natural infection / maternal antibodies or antibody injection.");

/* ===== VACCINATION & PUBLIC HEALTH Q7, Q10 ===== */
const VP = "Vaccination & Public Health";
add(VP,"★★★★★ Q7. Explain how vaccination protects populations.","Vaccines contain antigens that stimulate an immune response without causing the disease itself. Memory cells are produced. On later exposure to the pathogen, a rapid secondary response prevents illness in many vaccinated individuals. High vaccination coverage also reduces transmission within the population.");
add(VP,"★★★★★ Q10. Explain herd immunity.","When a high proportion of a population is immune, transmission of a pathogen is reduced. This decreases the likelihood that susceptible individuals will encounter an infectious person, helping protect those who cannot be vaccinated or who respond poorly to vaccines.");

/* ===== ANTIBIOTICS & RESISTANCE Q8-9 ===== */
const AB = "Antibiotics & Resistance";
add(AB,"★★★★★ Q8. Explain antibiotic resistance.","Random mutations may produce resistant bacteria. Antibiotics create a selection pressure by killing susceptible bacteria while resistant individuals survive. Resistant bacteria reproduce by binary fission, increasing the frequency of resistance genes. Resistance genes may also spread by plasmid transfer.");
add(AB,"★★★★☆ Q9. Why do antibiotics not treat viral infections?","Antibiotics target bacterial structures or metabolic processes, such as cell wall synthesis or bacterial ribosomes. Viruses lack these structures and reproduce using host-cell machinery, so antibiotics are ineffective against viral infections.");

/* ===== PRACTICAL SKILLS Q11-12 ===== */
const PS = "Practical Skills";
add(PS,"★★★★★ Q11. Antibiotic disc diffusion — what are the independent and dependent variables?","Independent variable: antibiotic type or concentration. Dependent variable: diameter of the inhibition zone.");
add(PS,"★★★★★ Q11. What must be controlled in the disc diffusion practical?","Agar depth; incubation temperature; incubation time; initial bacterial concentration; disc size.");
add(PS,"★★★★★ Q11. State four improvements to the disc diffusion investigation.","Repeat investigations; calculate mean inhibition-zone diameter; use aseptic technique throughout; measure inhibition zones consistently.");
add(PS,"★★★★☆ Q12. Why is aseptic technique important?","It prevents contamination of cultures by unwanted microorganisms, improves the validity of results, and reduces the risk of infection to the investigator.");

/* ===== TOP 10 MISTAKES ===== */
const MX = "Top 10 Mistakes";
add(MX,"❌ 'Antibiotics kill viruses.' What's correct?","✔ Antibiotics act only against bacteria.");
add(MX,"❌ 'Vaccines contain antibodies.' What's correct?","✔ Vaccines contain antigens, which stimulate the body to produce its own antibodies.");
add(MX,"❌ 'Phagocytes produce antibodies.' What's correct?","✔ Plasma cells (derived from B lymphocytes) produce antibodies — phagocytes engulf pathogens directly.");
add(MX,"❌ 'Memory cells are produced in passive immunity.' What's correct?","✔ Memory cells are produced only in active immunity.");
add(MX,"❌ 'Antibiotics cause mutations.' What's correct?","✔ Mutations occur randomly; antibiotics create a selection pressure that favours already-resistant bacteria.");
add(MX,"❌ 'Viruses reproduce by binary fission.' What's correct?","✔ Only bacteria reproduce by binary fission — viruses replicate using host cell machinery.");
add(MX,"❌ 'All bacteria are harmful.' What's correct?","✔ Many bacteria are harmless or beneficial (e.g. gut microbiota).");
add(MX,"❌ 'Vaccination guarantees complete protection.' What's correct?","✔ Vaccination greatly reduces risk but may not provide complete protection in every individual.");
add(MX,"❌ 'Antibodies destroy pathogens directly.' What's correct?","✔ Antibodies bind specifically to antigens and help neutralise or mark pathogens for destruction (e.g. by phagocytes).");
add(MX,"❌ 'Larger inhibition zones always mean a stronger antibiotic, regardless of conditions.' What's correct?","✔ Zone size depends on multiple factors, including diffusion rate, concentration and bacterial susceptibility — not antibiotic strength alone.");

/* ===== A★ MEMORY CHECKLIST ===== */
const MC = "A★ Memory Checklist";
add(MC,"Define: Antigen vs Antibody.","Antigen: a molecule (often on a pathogen's surface) that triggers an immune response. Antibody: a Y-shaped protein produced by plasma cells, with a binding site complementary to a specific antigen.");
add(MC,"Define: Plasma cells vs Memory cells.","Plasma cells: differentiated B lymphocytes that secrete large quantities of antibodies during the immune response. Memory cells: long-lived B (or T) lymphocytes that persist after infection, enabling a fast secondary response.");
add(MC,"Define: Clonal expansion.","The rapid mitotic division of a B (or T) lymphocyte that has recognised its complementary antigen, producing many identical cells.");
add(MC,"Define: Active immunity vs Passive immunity (recap).","Active: immune system makes its own antibodies (via infection or vaccination), memory cells formed, long-lasting. Passive: antibodies received from another source (e.g. mother or injection), no memory cells, short-term protection.");
add(MC,"Define: Herd immunity (recap).","Protection of a population — including unvaccinated/immunocompromised individuals — that occurs when enough people are immune to reduce overall pathogen transmission.");
add(MC,"Define: Antibiotic resistance (recap).","The reduced effectiveness of an antibiotic against bacteria that have evolved (via mutation and selection pressure) the ability to survive it.");
add(MC,"Define: Aseptic technique.","A set of practices (e.g. flaming equipment, working near a Bunsen flame, sterilising agar/media) used to prevent contamination of microbiological cultures by unwanted microorganisms.");
add(MC,"Define: Disc diffusion practical in one line.","A method for testing antibiotic effectiveness by placing antibiotic-soaked discs on an inoculated agar plate and measuring the diameter of the clear zone (no bacterial growth) around each disc.");

/* ===== EXPECTED EXAM FREQUENCY ===== */
const EF = "Exam Frequency";
add(EF,"Rate the exam probability of: antibody production, vaccination, antibiotic resistance, bacteria vs viruses, disc diffusion practical.","All ★★★★★.");
add(EF,"Rate the exam probability of: phagocytosis, herd immunity.","Both ★★★★☆.");

/* ===== A★ EXAM STRATEGY ===== */
const ES = "A★ Exam Strategy";
add(ES,"What is the 5-step biological sequence for structuring any immunity answer?","1. Pathogen enters the body. 2. Innate (non-specific) defence acts first (e.g. phagocytosis). 3. Specific immune response is activated (B lymphocytes and antibody production). 4. Memory cells are formed, leading to a faster secondary response. 5. Apply the concept to vaccination, disease prevention or antibiotic resistance if required.");
add(ES,"What comes next in the A★ Examiner Prediction Pack series?","Prediction 8: Genetics, Inheritance, Evolution & Biodiversity — the 20 highest-probability questions, monohybrid inheritance, genetic variation and natural selection, speciation, classification and biodiversity, Hardy-Weinberg-style applications where relevant, full A★ model answers, examiner guidance and common misconceptions.");

/* ---------------- APP LOGIC ---------------- */
const TOPICS = [LO, PD, SI, VP, AB, PS, MX, MC, EF, ES];
let currentTopic = "All";
let order = [];
let pos = 0;
let known = new Set();
let flipped = false;

const STORAGE_KEY = "bio_immunity_progress_v1";

function loadProgress(){
  try{
    const raw = localStorageSafe.getItem(STORAGE_KEY);
    if(raw){ known = new Set(JSON.parse(raw)); }
  }catch(e){}
}
function saveProgress(){
  try{ localStorageSafe.setItem(STORAGE_KEY, JSON.stringify([...known])); }catch(e){}
}
/* In-memory fallback (artifacts / private browsing safe) */
const memStore = {};
const localStorageSafe = {
  getItem(k){ try{ return window.localStorage.getItem(k); }catch(e){ return memStore[k] || null; } },
  setItem(k,v){ try{ window.localStorage.setItem(k,v); }catch(e){ memStore[k]=v; } }
};

function buildTopicBar(){
  const bar = document.getElementById('topicBar');
  const all = ["All", ...TOPICS];
  bar.innerHTML = "";
  all.forEach(t=>{
    const chip = document.createElement('div');
    chip.className = 'chip' + (t===currentTopic ? ' active':'');
    chip.textContent = t==="All" ? "All Topics" : t;
    chip.onclick = ()=>{ currentTopic = t; setupDeck(); buildTopicBar(); };
    bar.appendChild(chip);
  });
}

function setupDeck(){
  const filtered = currentTopic==="All" ? DECK : DECK.filter(c=>c.topic===currentTopic);
  order = filtered.map(c=>c.id);
  pos = 0;
  flipped = false;
  render();
}

function shuffleDeck(){
  for(let i=order.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [order[i],order[j]] = [order[j],order[i]];
  }
  pos = 0;
  flipped = false;
  render();
}

function currentCard(){
  const id = order[pos];
  return DECK.find(c=>c.id===id);
}

function render(){
  const card = currentCard();
  const cardEl = document.getElementById('card');
  cardEl.classList.remove('flipped');
  flipped = false;
  if(!card){
    document.getElementById('qText').textContent = "No cards in this topic.";
    document.getElementById('aText').innerHTML = "";
    return;
  }
  document.getElementById('qText').innerHTML = card.q;
  document.getElementById('aText').innerHTML = card.a;
  const shortTag = card.topic;
  document.getElementById('tagFront').textContent = shortTag;
  document.getElementById('tagBack').textContent = shortTag;
  document.getElementById('idxFront').textContent = (pos+1)+"/"+order.length;
  document.getElementById('idxBack').textContent = (pos+1)+"/"+order.length;
  document.getElementById('progressLabel').textContent = (pos+1)+" / "+order.length;
  document.getElementById('progressFill').style.width = order.length ? (((pos+1)/order.length)*100)+"%" : "0%";
  document.getElementById('knownLabel').textContent = "✓ "+[...known].filter(id=>order.includes(id)).length;
  document.getElementById('deckLabel').textContent = (currentTopic==="All"?"All Topics":currentTopic) + " · " + order.length + " cards";
}

function flip(){
  const cardEl = document.getElementById('card');
  flipped = !flipped;
  cardEl.classList.toggle('flipped', flipped);
}

function next(){
  if(order.length===0) return;
  pos = (pos+1) % order.length;
  render();
}
function prev(){
  if(order.length===0) return;
  pos = (pos-1+order.length) % order.length;
  render();
}

function rate(status){
  const card = currentCard();
  if(!card) return;
  if(status==="good"){ known.add(card.id); }
  else { known.delete(card.id); }
  saveProgress();
  next();
}

/* Events */
document.getElementById('card').addEventListener('click', flip);
document.getElementById('nextBtn').addEventListener('click', next);
document.getElementById('prevBtn').addEventListener('click', prev);
document.getElementById('shuffleBtn').addEventListener('click', shuffleDeck);
document.getElementById('rateAgain').addEventListener('click', ()=>rate('again'));
document.getElementById('rateHard').addEventListener('click', ()=>rate('hard'));
document.getElementById('rateGood').addEventListener('click', ()=>rate('good'));
document.getElementById('resetLink').addEventListener('click', ()=>{
  known = new Set();
  saveProgress();
  render();
});

/* Swipe support */
let touchStartX = null, touchStartY = null;
const stage = document.querySelector('.stage');
stage.addEventListener('touchstart', e=>{
  touchStartX = e.changedTouches[0].clientX;
  touchStartY = e.changedTouches[0].clientY;
}, {passive:true});
stage.addEventListener('touchend', e=>{
  if(touchStartX===null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)){
    if(dx < 0) next(); else prev();
  }
  touchStartX = null; touchStartY = null;
}, {passive:true});

/* Keyboard support (desktop) */
document.addEventListener('keydown', e=>{
  if(e.key==="ArrowRight") next();
  else if(e.key==="ArrowLeft") prev();
  else if(e.key===" "){ e.preventDefault(); flip(); }
  else if(e.key==="1") rate('again');
  else if(e.key==="2") rate('hard');
  else if(e.key==="3") rate('good');
});

/* Init */
loadProgress();
buildTopicBar();
setupDeck();
</script>
</body>
</html>
